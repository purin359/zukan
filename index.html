<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ文字検索</title>
<style>
body { font-family: sans-serif; padding: 10px; }

.searchWrap { display:flex; gap:5px; margin-bottom:10px; }
.searchBox { flex:1; padding:8px; font-size:16px; }

#searchContent {
  font-size: 1.0em;
}

#resultScreenInner {
  transform: scale(1.2);
  transform-origin: top left;
  width: 76.9%; /* 1 ÷ 1.3 */
}

.gradeHeader { background:#eee; padding:8px; cursor:pointer; margin-top:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(20,1fr);
  gap:4px;
  margin-bottom:10px;
}

/* 検索画面だけ大きくする */
.searchGrid {
  grid-template-columns: repeat(12, 1fr);
  gap: 6px;
}

.searchGrid .char {
  padding: 10px;
  font-size: 18px;
}

.char {
  border: 1px solid #ccc;   
  padding: 10px;
  font-size: 18px;

  display: flex;             
  justify-content: center;   
  align-items: center;       
}

.char.active { color:blue; background:#e0f0ff; font-weight:bold; }
.char.selected { background:blue; color:white; }

.hit { color:blue; font-weight:bold; }

.result { border-bottom:1px solid #ccc; padding:8px 0; }
</style>
</head>
<body>

<div id="searchScreen">
  <div id="searchContent">
<h2>味方文字検索 ver.2.3.7</h2>

<div class="searchWrap">
  <input type="text" id="searchInput" class="searchBox">
  <button onclick="searchFromInput()">検索</button>
</div>

<div class="gradeHeader" id="headerGAll" data-base="常用漢字" onclick="toggle('gAll', this)">▼ 常用漢字</div>
<div id="gAll">
  <div class="gradeHeader" id="headerGElem" data-base="小学生" onclick="toggle('gElem', this)">▼ 小学生で習う漢字</div>
  <div id="gElem">
    <div id="g1"><div id="grid1" class="grid"></div></div>
    <div id="g2"><div id="grid2" class="grid"></div></div>
    <div id="g3"><div id="grid3" class="grid"></div></div>
    <div id="g4"><div id="grid4" class="grid"></div></div>
    <div id="g5"><div id="grid5" class="grid"></div></div>
    <div id="g6"><div id="grid6" class="grid"></div></div>
  </div>

</div>

<div class="gradeHeader" id="headerExtra" data-base="常用漢字外" onclick="toggle('extraGrid', this)">
  ▼ 常用漢字外 0種類
</div>
<div id="extraGrid" class="grid"></div>

 </div>
</div>

<div id="resultScreen" style="display:none;">
  <div id="resultScreenInner">
    <button onclick="back()">← 戻る</button>
    <h2 id="selectedText"></h2>
    <div id="result"></div>
  </div>
</div>

// ===== JSONファイル =====
const files=["basic.json","ex.json","rare.json","superrare.json","ultrarare.json","legendrare.json"];
Promise.all(files.map(f=>fetch(f).then(r=>r.json()).catch(()=>[])))
.then(r=>{ data=r.flat(); init(); });

// ===== 初期化 =====
function init(){
  createGridWithHeader(chars1,"grid1","1年生で習う漢字");
  createGridWithHeader(chars2,"grid2","2年生で習う漢字");
  createGridWithHeader(chars3,"grid3","3年生で習う漢字");
  createGridWithHeader(chars4,"grid4","4年生で習う漢字");
  createGridWithHeader(chars5,"grid5","5年生で習う漢字");
  createGridWithHeader(chars6,"grid6","6年生で習う漢字");
  createGridWithHeader(chars7,"grid7","中学生");

  createExtraKanji();

  document.getElementById("searchInput").addEventListener("keydown",e=>{ if(e.key==="Enter") searchFromInput(); });

  updateGroupHeader();
}

// ===== 折りたたみ =====
function toggle(id, header){
  const el = document.getElementById(id);

  const isOpen = el.style.display === "none";

  // ★ gridに戻す
  el.style.display = isOpen ? "grid" : "none";

  // ▼▶切り替え
  if(isOpen){
    header.innerHTML = header.innerHTML.replace("▶", "▼");
  }else{
    header.innerHTML = header.innerHTML.replace("▼", "▶");
  }
}
  
// ===== 検索 =====
function normalize(str){ return (str||"").toLowerCase(); }
function highlight(text,keyword){ const re=new RegExp(`(${keyword})`,"gi"); return text.replace(re,`<span class="hit">$1</span>`); }
function searchFromInput(){ const v=document.getElementById("searchInput").value.trim(); if(v) search(v); }
function search(keyword){
  document.getElementById("searchScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";

  window.scrollTo(0, 0);

  const resultDiv=document.getElementById("result");
  resultDiv.innerHTML="";

  const key=normalize(keyword);
  let total=0;

  data.forEach(ch=>{
  ch.forms.forEach(f=>{
    const name = normalize(f.name);
    const desc = normalize(f.description);
    if(name.includes(key) || desc.includes(key)){
      total++;
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML = `
        <strong>${highlight(f.name, keyword)}</strong><br>
        ${highlight(f.description, keyword).replace(/\n/g, "<br>")}
      `;

      resultDiv.appendChild(div);
    }
  });
});

  document.getElementById("selectedText").innerText=`"${keyword}" の検索結果　${total}件見つかりました`;
}

// ===== 戻る =====
function back(){ document.getElementById("resultScreen").style.display="none"; document.getElementById("searchScreen").style.display="block"; }

// ===== 使用済み判定 =====
function isUsed(c){ return data.some(ch=>ch.forms.some(f=>f.name.includes(c)||f.description.includes(c))); }

// ===== グリッド生成（n/m付き） =====
function createGridWithHeader(chars,id,name){
  const container = document.getElementById(id).parentNode;
  container.innerHTML = "";

  // ヘッダー
  const header = document.createElement("div");
  header.className = "gradeHeader";
  header.dataset.base = name;

  const used = chars.filter(isUsed).length;
  header.innerHTML = `▼ ${name} (${used}/${chars.length})`;

  header.onclick = () => toggle(id, header);

  // グリッド
  const grid = document.createElement("div");
  grid.id = id;
  grid.className = "grid";

  chars.forEach(c=>{
    const div=document.createElement("div");
    div.className="char";
    if(isUsed(c)) div.classList.add("active");
    div.innerText=c;
    div.onclick=()=>{
      document.getElementById("searchInput").value=c;
      searchFromInput();
    };
    grid.appendChild(div);
  });

  container.appendChild(header);
  container.appendChild(grid);
}
  
// ===== 各グループ n/m ヘッダー更新 =====
function updateGroupHeader(){
  ["gAll","gElem","g7"].forEach(id=>{
    const g=document.getElementById(id);
    const grids=g.querySelectorAll(".grid");
    const used=Array.from(grids).reduce((a,g)=>a+g.querySelectorAll(".active").length,0);
    const total=Array.from(grids).reduce((a,g)=>a+g.children.length,0);
    const header=g.parentNode.querySelector(`#header${id}`) || g.previousElementSibling;
    if(header && header.dataset.base) header.innerText=`▼ ${header.dataset.base} (${used}/${total})`;
  });
}

// ===== 常用漢字外をまとめて左詰め表示 =====
function createExtraKanji(){
  const extraGrid=document.getElementById("extraGrid");
  extraGrid.innerHTML="";
  const allChars = chars1.concat(chars2,chars3,chars4,chars5,chars6,chars7);

  const usedChars=data.flatMap(ch=>ch.forms.flatMap(f=>f.name.split("").concat(f.description.split(""))));
  const extra=Array.from(new Set(
    usedChars.filter(c=>!allChars.includes(c)&&/[\u4E00-\u9FFF]/.test(c))
  ));

  const header=document.getElementById("headerExtra");
  header.innerText=`▼ ${header.dataset.base} ${extra.length}種類`;

  extra.forEach(c=>{
    const div=document.createElement("div");
    div.className="char";
    div.innerText=c;
    div.onclick=()=>{document.getElementById("searchInput").value=c; searchFromInput();};
    extraGrid.appendChild(div);
  });
}
</script>
