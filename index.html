<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ検索</title>

<style>
body { font-family: sans-serif; padding: 10px; }

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 4px;
  margin-bottom: 20px;
}

/* ボタン */
.char {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  cursor: pointer;
  user-select: none;
}

/* 使用されている文字 */
.char.active {
  color: blue;
  background: #e0f0ff;
  font-weight: bold;
}

/* 選択中 */
.char.selected {
  background: blue;
  color: white;
}

/* 結果 */
.result {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}
</style>
</head>

<body>

<h2>文字検索</h2>
<div id="grid" class="grid"></div>

<h2 id="selectedText"></h2>

<h2>検索結果</h2>
<div id="result"></div>

<script>
let data = [];

// 文字一覧（自由に追加OK）
const chars = [
"一","二","三","四","五","六","七","八","九","十","百","千","日","月","火","水","木","金","土","田",
"山","川","林","森","石","天","気","空","雨","夕","草","花","竹","文","字","本","円","玉","年","音",
"学","校","先","生","赤","白","青","人","男","女","子","目","耳","口","手","足","犬","貝","虫","王",
"力","町","村","車","大","中","小","上","下","左","右","正","出","入","立","見","休","早","名","糸"
];

// ===== 初期化 =====
fetch("kihon.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    init();
  });

// ===== メイン処理 =====
function init() {
  const usedChars = new Set();

  // 使用文字収集
  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;
      for (let char of text) {
        usedChars.add(char);
      }
    });
  });

  const grid = document.getElementById("grid");

  chars.forEach(c => {
    const div = document.createElement("div");
    div.className = "char";
    div.textContent = c;

    // 使用されてる文字を青に
    if (usedChars.has(c)) {
      div.classList.add("active");
    }

    // クリック処理
    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");

      document.getElementById("selectedText").textContent = "選択: " + c;

      search(c);
    };

    grid.appendChild(div);
  });
}

// ===== 検索 =====
function search(keyword) {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const results = data.filter(ch =>
    ch.forms.some(f =>
      f.name.includes(keyword) ||
      f.description.includes(keyword)
    )
  );

  if (results.length === 0) {
    resultDiv.textContent = "該当なし";
    return;
  }

  results.forEach(ch => {
    ch.forms.forEach(f => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML =
        `<b>${f.name}</b><br>` +
        f.description.replace(/\n/g, "<br>");

      resultDiv.appendChild(div);
    });
  });
}
</script>

</body>
</html>
