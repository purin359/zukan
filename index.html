<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ検索</title>

<style>
body { font-family: sans-serif; padding: 10px; }

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 4px;
  margin-bottom: 20px;
}

/* ボタン */
.char {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  cursor: pointer;
  user-select: none;
}

/* 使用されている文字 */
.char.active {
  color: blue;
  background: #e0f0ff;
  font-weight: bold;
}

/* 選択中 */
.char.selected {
  background: blue;
  color: white;
}

/* 検索ヒット文字 */
.hit {
  color: blue;
  font-weight: bold;
}

/* 結果 */
.result {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}

/* 戻るボタン */
.backBtn {
  margin-bottom: 10px;
  padding: 6px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 検索画面 -->
<div id="searchScreen">
  <h2>文字検索</h2>
  <div id="grid" class="grid"></div>
</div>

<!-- 結果画面 -->
<div id="resultScreen" style="display:none;">
  <button class="backBtn" onclick="back()">← 戻る</button>
  <h2 id="selectedText"></h2>
  <div id="result"></div>
</div>

<script>
let data = [];

// 文字一覧
const chars = [
"一","二","三","四","五","六","七","八","九","十","百","千","日","月","火","水","木","金","土","田",
"山","川","林","森","石","天","気","空","雨","夕","草","花","竹","文","字","本","円","玉","年","音",
"学","校","先","生","赤","白","青","人","男","女","子","目","耳","口","手","足","犬","貝","虫","王",
"力","町","村","車","大","中","小","上","下","左","右","正","出","入","立","見","休","早","名","糸"
];

// JSON読み込み
fetch("kihon.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    init();
  });

// 初期化
function init() {
  const usedChars = new Set();

  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;
      for (let char of text) {
        usedChars.add(char);
      }
    });
  });

  const grid = document.getElementById("grid");

  chars.forEach(c => {
    const div = document.createElement("div");
    div.className = "char";
    div.textContent = c;

    if (usedChars.has(c)) {
      div.classList.add("active");
    }

    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");
      search(c);
    };

    grid.appendChild(div);
  });
}

// ハイライト関数
function highlight(text, keyword) {
  return text.replaceAll(keyword, `<span class="hit">${keyword}</span>`);
}

// 検索処理
function search(keyword) {
  // 画面切り替え
  document.getElementById("searchScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const results = data.filter(ch =>
    ch.forms.some(f =>
      f.name.includes(keyword) ||
      f.description.includes(keyword)
    )
  );

  // 件数（進化含む）
  const count = results.reduce((sum, ch) => sum + ch.forms.length, 0);

  document.getElementById("selectedText").textContent =
    "検索: " + keyword + "（" + count + "件）";

  if (results.length === 0) {
    resultDiv.textContent = "該当なし";
    return;
  }

  results.forEach(ch => {
    ch.forms.forEach(f => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML =
        `<b>${highlight(f.name, keyword)}</b><br>` +
        highlight(f.description, keyword).replace(/\n/g, "<br>");

      resultDiv.appendChild(div);
    });
  });
}

// 戻る処理
function back() {
  document.getElementById("searchScreen").style.display = "block";
  document.getElementById("resultScreen").style.display = "none";
}
</script>

</body>
</html>
