<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ検索</title>

<style>
body { font-family: sans-serif; padding: 10px; }

/* 検索ボックス */
.searchBox {
  width: 100%;
  padding: 8px;
  font-size: 16px;
  margin-bottom: 10px;
}

/* カウント */
.countText {
  text-align: center;
  font-size: 18px;
  margin: 10px 0;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 4px;
  margin-bottom: 20px;
}

/* ボタン */
.char {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  cursor: pointer;
}

.char.active {
  color: blue;
  background: #e0f0ff;
  font-weight: bold;
}

.char.selected {
  background: blue;
  color: white;
}

/* ハイライト */
.hit {
  color: blue;
  font-weight: bold;
}

/* 結果 */
.result {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}

.backBtn {
  margin-bottom: 10px;
  padding: 6px 10px;
}
</style>
</head>

<body>

<!-- 検索画面 -->
<div id="searchScreen">

  <h2>味方文字検索v1.1.2</h2>

  <!-- ★ 検索ボックス -->
  <div style="display:flex; gap:5px; margin-bottom:10px;">
  <input type="text" id="searchInput" class="searchBox" placeholder="文字を入力">
  <button onclick="searchFromInput()">検索</button>
</div>

  <!-- 1年 -->
  <div id="countText1" class="countText"></div>
  <div id="grid1" class="grid"></div>

  <!-- 2年 -->
  <div id="countText2" class="countText"></div>
  <div id="grid2" class="grid"></div>

</div>

<!-- 結果画面 -->
<div id="resultScreen" style="display:none;">
  <button class="backBtn" onclick="back()">← 戻る</button>
  <h2 id="selectedText"></h2>
  <div id="result"></div>
</div>

<script>
let data = [];

// ===== 1年 =====
const chars1 = `
一二三四五六七八九十百千日月火水木金土田
山川林森石天気空雨夕草花竹文字本円玉年音
学校先生赤白青人男女子目耳口手足犬貝虫王
力町村車大中小上下左右正出入立見休早名糸
`.replace(/\n/g, "").split("");

// ===== 2年 =====
const chars2 = `
引羽雲園遠何科夏家歌画回会海絵外角楽活間
丸岩顔汽記帰弓牛魚京強教近兄形計元言原戸
古午後語工公広交光考行高黄合谷国黒今才細
作算止市矢姉思紙寺自時室社弱首秋週春書少
場色食心新親図数西声星晴切雪船線前組走多
太体台地池知茶昼長鳥朝直通弟店点電刀冬当
東答頭同道読内南肉馬売買麦半番父風分聞米
歩母方北毎妹万明鳴毛門夜野友用曜来里理話
`.replace(/\n/g, "").split("");

// JSON読み込み
fetch("kihon.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    init();
  });

// ===== 初期化 =====
function init() {
  createGrid(chars1, "grid1", "countText1", "1年生で習う漢字");
  createGrid(chars2, "grid2", "countText2", "2年生で習う漢字");

  // ★ 入力検索
  function searchFromInput() {
  const val = document.getElementById("searchInput").value.trim();
  if (val) {
    search(val);
  }
}
// ===== グリッド生成 =====
function createGrid(chars, gridId, countId, title) {
  const usedChars = new Set();

  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;
      for (let char of text) {
        usedChars.add(char);
      }
    });
  });

  const grid = document.getElementById(gridId);
  let activeCount = 0;

  chars.forEach(c => {
    const div = document.createElement("div");
    div.className = "char";
    div.textContent = c;

    if (usedChars.has(c)) {
      div.classList.add("active");
      activeCount++;
    }

    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");
      search(c);
    };

    grid.appendChild(div);
  });

  document.getElementById(countId).innerHTML =
    `${title} <span style="color:blue">${activeCount}</span> / ${chars.length}`;
}

// ===== ハイライト =====
function highlight(text, keyword) {
  return text.replaceAll(keyword, `<span class="hit">${keyword}</span>`);
}

// ===== 検索 =====
function search(keyword) {
  document.getElementById("searchScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const results = data.map(ch => {
    const matchedForms = ch.forms.filter(f =>
      f.name.includes(keyword) ||
      f.description.includes(keyword)
    );
    return { ...ch, forms: matchedForms };
  }).filter(ch => ch.forms.length > 0);

  const count = results.reduce((sum, ch) => sum + ch.forms.length, 0);

  document.getElementById("selectedText").textContent =
    "検索: " + keyword + "　" + count + "件見つかりました";

  if (count === 0) {
    resultDiv.textContent = "該当なし";
    return;
  }

  results.forEach(ch => {
    ch.forms.forEach(f => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML =
        `<b>${highlight(f.name, keyword)}</b><br>` +
        highlight(f.description, keyword).replace(/\n/g, "<br>");

      resultDiv.appendChild(div);
    });
  });
}

// ===== 戻る =====
function back() {
  document.getElementById("searchScreen").style.display = "block";
  document.getElementById("resultScreen").style.display = "none";
}
</script>

</body>
</html>
