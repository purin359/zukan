<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ検索</title>

<style>
body { font-family: sans-serif; padding: 10px; }

/* カウント表示 */
#countText {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 4px;
  margin-bottom: 20px;
}

/* ボタン */
.char {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  cursor: pointer;
  user-select: none;
}

.char.active {
  color: blue;
  background: #e0f0ff;
  font-weight: bold;
}

.char.selected {
  background: blue;
  color: white;
}

.hit {
  color: blue;
  font-weight: bold;
}

.result {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}

.backBtn {
  margin-bottom: 10px;
  padding: 6px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 検索画面 -->
<div id="searchScreen">
  <h2>文字検索v1.1.1</h2>

  <!-- ★ カウント表示 -->
  <div id="countText"></div>

  <div id="grid" class="grid"></div>
</div>

<!-- 結果画面 -->
<div id="resultScreen" style="display:none;">
  <button class="backBtn" onclick="back()">← 戻る</button>
  <h2 id="selectedText"></h2>
  <div id="result"></div>
</div>

<script>
let data = [];

// ★ コピペ用文字列
const chars = `
一二三四五六七八九十百千日月火水木金土田
山川林森石天気空雨夕草花竹文字本円玉年音
学校先生赤白青人男女子目耳口手足犬貝虫王
力町村車大中小上下左右正出入立見休早名糸
`.replace(/\n/g, "").split("");

// JSON読み込み
fetch("kihon.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    init();
  });

// 初期化
function init() {
  const usedChars = new Set();

  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;
      for (let char of text) {
        usedChars.add(char);
      }
    });
  });

  const grid = document.getElementById("grid");

  let activeCount = 0;

  chars.forEach(c => {
    const div = document.createElement("div");
    div.className = "char";
    div.textContent = c;

    if (usedChars.has(c)) {
      div.classList.add("active");
      activeCount++;
    }

    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");
      search(c);
    };

    grid.appendChild(div);
  });

  // ★ カウント表示（数字だけ青）
  document.getElementById("countText").innerHTML =
    `1年生で習う漢字 <span style="color:blue">${activeCount}</span> / ${chars.length}`;
}

// ハイライト
function highlight(text, keyword) {
  return text.replaceAll(keyword, `<span class="hit">${keyword}</span>`);
}

// 検索
function search(keyword) {
  document.getElementById("searchScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const results = data.map(ch => {
    const matchedForms = ch.forms.filter(f =>
      f.name.includes(keyword) ||
      f.description.includes(keyword)
    );
    return { ...ch, forms: matchedForms };
  }).filter(ch => ch.forms.length > 0);

  const count = results.reduce((sum, ch) => sum + ch.forms.length, 0);

  document.getElementById("selectedText").textContent =
    "検索: " + keyword + "　" + count + "件見つかりました";

  if (count === 0) {
    resultDiv.textContent = "該当なし";
    return;
  }

  results.forEach(ch => {
    ch.forms.forEach(f => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML =
        `<b>${highlight(f.name, keyword)}</b><br>` +
        highlight(f.description, keyword).replace(/\n/g, "<br>");

      resultDiv.appendChild(div);
    });
  });
}

// 戻る
function back() {
  document.getElementById("searchScreen").style.display = "block";
  document.getElementById("resultScreen").style.display = "none";
}
</script>

</body>
</html>
