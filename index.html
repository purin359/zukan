<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ検索</title>

<style>
body { font-family: sans-serif; padding: 10px; }

/* 検索 */
.searchWrap {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.searchBox {
  flex: 1;
  padding: 8px;
  font-size: 16px;
}

/* 折りたたみボタン */
.gradeHeader {
  background: #eee;
  padding: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* カウント */
.countText {
  text-align: center;
  font-size: 16px;
  margin: 5px 0;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 4px;
  margin-bottom: 10px;
}

/* ボタン */
.char {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  cursor: pointer;
}

.char.active {
  color: blue;
  background: #e0f0ff;
  font-weight: bold;
}

.char.selected {
  background: blue;
  color: white;
}

/* ハイライト */
.hit {
  color: blue;
  font-weight: bold;
}

/* 結果 */
.result {
  border-bottom: 1px solid #ccc;
  padding: 8px 0;
}

.backBtn {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- 検索画面 -->
<div id="searchScreen">

<h2>味方文字検索 v1.4</h2>

<div class="searchWrap">
  <input type="text" id="searchInput" class="searchBox" placeholder="文字を入力">
  <button onclick="searchFromInput()">検索</button>
</div>

<!-- 1年 -->
<div class="gradeHeader" onclick="toggle('g1', this)">▼ 1年生</div>

  <div id="grid1" class="grid"></div>
</div>

<!-- 2年 -->

// ===== JSON =====
const files = [
  "kihon.json",
  "ex.json",
  "rare.json",
  "superrare.json",
  "ultrarare.json",
  "legendrare.json"
];

Promise.all(
  files.map(f => fetch(f).then(r => r.json()))
)
.then(results => {
  data = results.flat();
  init();
});

// ===== 初期化 =====
function init() {
  createGrid(chars1, "grid1", "countText1", "1年生で習う漢字");
  createGrid(chars2, "grid2", "countText2", "2年生で習う漢字");
  createGrid(chars3, "grid3", "countText3", "3年生で習う漢字");
  createGrid(chars4, "grid4", "countText4", "4年生で習う漢字");
  createGrid(chars5, "grid5", "countText5", "5年生で習う漢字");
  createGrid(chars6, "grid6", "countText6", "6年生で習う漢字");
  createGrid(chars7, "grid7", "countText7", "中学校で習う漢字");
  createExtraKanji();

  // Enterキー検索
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") searchFromInput();
  });
}

// ===== 折りたたみ =====
function toggle(id, el) {
  const box = document.getElementById(id);
  const isOpen = box.style.display !== "none";

  box.style.display = isOpen ? "none" : "block";

  const text = el.innerHTML.slice(2);
  el.innerHTML = (isOpen ? "▶ " : "▼ ") + text;
}
// ===== 入力検索 =====
function searchFromInput() {
  const val = document.getElementById("searchInput").value.trim();
  if (val) search(val);
}

// ===== グリッド =====
function createGrid(chars, gridId, countId, title) {
  const usedChars = new Set();

  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;
      for (let c of text) usedChars.add(c);
    });
  });

  const grid = document.getElementById(gridId);
  let activeCount = 0;

  chars.forEach(c => {
    const div = document.createElement("div");
    div.className = "char";
    div.textContent = c;

    if (usedChars.has(c)) {
      div.classList.add("active");
      activeCount++;
    }

    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");
      search(c);
    };

    grid.appendChild(div);
  });

  // ★ここ追加（ヘッダーを書き換える）
 const header = grid.parentElement.previousElementSibling;
  header.innerHTML =
    `▼ ${title} <span style="color:blue">${activeCount}</span> / ${chars.length}`;
}

// ===== ハイライト =====
function highlight(text, keyword) {
  return text.replaceAll(keyword, `<span class="hit">${keyword}</span>`);
}

// ===== 検索 =====
function search(keyword) {
  document.getElementById("searchScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const results = data.map(ch => {
    const forms = ch.forms.filter(f =>
      f.name.includes(keyword) ||
      f.description.includes(keyword)
    );
    return { ...ch, forms };
  }).filter(ch => ch.forms.length > 0);

  const count = results.reduce((sum, ch) => sum + ch.forms.length, 0);

  document.getElementById("selectedText").textContent =
    `検索: ${keyword}　${count}件見つかりました`;

  if (count === 0) {
    resultDiv.textContent = "該当なし";
    return;
  }

  results.forEach(ch => {
    ch.forms.forEach(f => {
      const div = document.createElement("div");
      div.className = "result";

      div.innerHTML =
        `<b>${highlight(f.name, keyword)}</b><br>` +
        highlight(f.description, keyword).replace(/\n/g, "<br>");

      resultDiv.appendChild(div);
    });
  });
}

// ===== 戻る =====
function back() {
  document.getElementById("searchScreen").style.display = "block";
  document.getElementById("resultScreen").style.display = "none";
}

function createExtraKanji() {

  // ===== 学年漢字まとめ =====
  const allLearned = new Set([
    ...chars1, ...chars2, ...chars3,
    ...chars4, ...chars5, ...chars6, ...chars7
  ]);

  // ===== 出現漢字 =====
  const usedMap = new Map(); // 漢字 → 最初に出たキャラ

  data.forEach(ch => {
    ch.forms.forEach(f => {
      const text = f.name + f.description;

      for (let c of text) {

        // 漢字だけ判定（ざっくり）
        if (!c.match(/[一-龯]/)) continue;

        // 学年漢字は除外
        if (allLearned.has(c)) continue;

        // 初出のみ登録（レアリティ順優先）
        if (!usedMap.has(c)) {
          usedMap.set(c, ch);
        }
      }
    });
  });

  // ===== レアリティ順で並べ替え =====
  const rarityOrder = [0,1,2,3,4,5];

  const sorted = Array.from(usedMap.entries())
    .sort((a,b) => {
      return rarityOrder.indexOf(a[1].rarity) - rarityOrder.indexOf(b[1].rarity);
    });

  // ===== 表示 =====
  const container = document.createElement("div");

  const header = document.createElement("div");
  header.className = "gradeHeader";
  header.textContent = `▼ 常用外漢字 ${sorted.length}`;
  header.onclick = () => toggle("gExtra", header);

  const box = document.createElement("div");
  box.id = "gExtra";

  const grid = document.createElement("div");
  grid.className = "grid";

  sorted.forEach(([char]) => {
    const div = document.createElement("div");
    div.className = "char active";
    div.textContent = char;

    div.onclick = () => {
      document.querySelectorAll(".char").forEach(e => e.classList.remove("selected"));
      div.classList.add("selected");
      search(char);
    };

    grid.appendChild(div);
  });

  box.appendChild(grid);

  // 画面に追加（中学の下）
  document.getElementById("searchScreen").appendChild(header);
  document.getElementById("searchScreen").appendChild(box);
}
  
</script>
