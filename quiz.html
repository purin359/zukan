<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>説明文クイズ</title>
<style>
body{
  font-family:sans-serif;
  padding:16px;
  max-width:600px;
  margin:auto;
}

textarea,input,button,select{
  font-size:16px;
  padding:10px;
  margin:6px 0;
  box-sizing:border-box;
}

input,select{
  width:100%;
}

button{
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

#desc{
  border:1px solid #ccc;
  padding:12px;
  min-height:120px;
  margin:12px 0;
  white-space:pre-wrap;
}

.correct{
  color:blue;
  font-weight:bold;
}

.wrong{
  color:red;
  font-weight:bold;
}
</style>
</head>
<body>

<h2>説明文クイズ</h2>

<select id="mode">
  <option value="ally">味方</option>
  <option value="enemy">敵</option>
</select>

<button onclick="startQuiz()">開始</button>

<div id="quizArea" style="display:none;">
  <p>問題数：<span id="count">0</span></p>

  <div id="desc"></div>

  <input id="answerInput" type="text" placeholder="キャラ名を入力">
  <button onclick="checkAnswer()">回答</button>
  <button onclick="nextQuestion()">次の問題</button>

  <div id="result"></div>
</div>

<script>
let data = [];
let quizList = [];
let current = null;
let count = 0;

// ===== JSON読み込み =====
async function loadData(mode){
  if(mode === "enemy"){
    data = await fetch("enemy.json").then(r=>r.json()).catch(()=>[]);
    quizList = data
      .filter(f => f.name && f.description)
      .map(f => ({
        name: f.name,
        description: f.description
      }));
  }else{
    const files = [
      "basic.json",
      "ex.json",
      "rare.json",
      "superrare.json",
      "ultrarare.json",
      "legendrare.json"
    ];

    const loaded = await Promise.all(
      files.map(f => fetch(f).then(r=>r.json()).catch(()=>[]))
    );

    data = loaded.flat();

    quizList = data.flatMap(ch =>
      ch.forms
        .filter(f => f.name && f.description)
        .map(f => ({
          name: f.name,
          description: f.description
        }))
    );
  }
}

// ===== 開始 =====
async function startQuiz(){
  const mode = document.getElementById("mode").value;
  await loadData(mode);

  count = 0;

  document.getElementById("quizArea").style.display = "block";
  document.getElementById("result").innerHTML = "";

  nextQuestion();
}

// ===== 次の問題 =====
function nextQuestion(){
  if(quizList.length === 0){
    document.getElementById("desc").innerText = "データがありません";
    return;
  }

  current = quizList[Math.floor(Math.random() * quizList.length)];
  count++;

  document.getElementById("count").innerText = count;
  document.getElementById("desc").innerText = current.description;
  document.getElementById("answerInput").value = "";
  document.getElementById("result").innerHTML = "";

  document.getElementById("answerInput").focus();
}

// ===== 回答判定 =====
function checkAnswer(){
  const input = document.getElementById("answerInput").value.trim();

  if(!input) return;

  const result = document.getElementById("result");

  if(normalize(input) === normalize(current.name)){
    result.innerHTML = `<p class="correct">正解！ ${current.name}</p>`;
  }else{
    result.innerHTML = `
      <p class="wrong">不正解</p>
      <p>答え：<b>${current.name}</b></p>
    `;
  }
}

// ===== 表記ゆれ軽減 =====
function normalize(str){
  return (str || "")
    .replace(/\s/g, "")
    .replace(/　/g, "")
    .toLowerCase();
}

// Enterで回答
document.getElementById("answerInput").addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    checkAnswer();
  }
});
</script>

</body>
</html>
