<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>説明文クイズ</title>

<style>
body{
  font-family:sans-serif;
  padding:16px;
  max-width:600px;
  margin:auto;
}

input,select,button{
  font-size:16px;
  padding:10px;
  margin:5px 0;
  width:100%;
  box-sizing:border-box;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
}

#desc{
  border:1px solid #ccc;
  padding:12px;
  margin:10px 0;
  min-height:120px;
  white-space:pre-wrap;
}

#suggest{
  border:1px solid #ccc;
  max-height:150px;
  overflow-y:auto;
}

.sugItem{
  padding:5px;
  cursor:pointer;
}
  
.sugItem:hover{
  background:#eee;
}

  select{
  flex:1;
}

button{
  cursor:pointer;
}

.correct{color:blue;}
.wrong{color:red;}
</style>
</head>
<body>

<h2>説明文クイズ</h2>

<div style="display:flex; gap:6px;">
  <select id="mode">
    <option value="ally">味方</option>
    <option value="enemy">敵</option>
  </select>

  <select id="rarity">
    <option value="all">全て</option>
    <option value="basic">基本</option>
    <option value="ex">EX</option>
    <option value="rare">レア</option>
    <option value="superrare">激レア</option>
    <option value="ultrarare">超激レア</option>
    <option value="legendrare">伝説レア</option>
  </select>
</div>

<div style="display:flex; gap:20px; margin:8px 0;">
  <span>スコア：<span id="score">0</span></span>
  <span>最高記録：<span id="best">0</span></span>
</div>

<input id="answer" placeholder="キャラ名">

<button onclick="check()">回答</button>
<div id="suggest"></div>

<div id="result"></div>

<script>
let quizList=[];
let current=null;
let score=0;

// ===== 正規化 =====
function normalize(str){
  return (str||"")
    .replace(/\s/g,"")
    .replace(/　/g,"")
    .toLowerCase();
}

// ===== データ取得 =====
async function loadData(){

  const mode=document.getElementById("mode").value;
  const rarity=document.getElementById("rarity").value;
  const finalOnly=document.getElementById("finalOnly").checked;

  if(mode==="enemy"){
    const data=await fetch("enemy.json").then(r=>r.json()).catch(()=>[]);

    quizList=data.map(f=>({
      name:f.name,
      desc:f.description||""
    }));

  }else{
    const map={
      basic:"basic.json",
      ex:"ex.json",
      rare:"rare.json",
      superrare:"superrare.json",
      ultrarare:"ultrarare.json",
      legendrare:"legendrare.json"
    };

    let files=[];

    if(rarity==="all"){
      files=Object.values(map);
    }else{
      files=[map[rarity]];
    }

    const loaded=await Promise.all(
      files.map(f=>fetch(f).then(r=>r.json()).catch(()=>[]))
    );

    const data=loaded.flat();

    quizList=data.flatMap(ch=>{
      let forms=ch.forms;

      if(finalOnly){
        forms=[forms[forms.length-1]];
      }

      return forms.map(f=>({
        name:f.name,
        desc:f.description||""
      }));
    });
  }

  buildSuggest();
}

// ===== サジェスト =====
let suggestList=[];

function buildSuggest(){
  suggestList=quizList.map(q=>q.name);
}

function updateSuggest(){
  const input=document.getElementById("answer").value;
  const key=normalize(input);

  const box=document.getElementById("suggest");
  box.innerHTML="";

  if(!key) return;

  suggestList.forEach(name=>{
    if(normalize(name).includes(key)){
      const div=document.createElement("div");
      div.className="sugItem";
      div.innerText=name;

      div.onclick=()=>{
        document.getElementById("answer").value=name;
        box.innerHTML="";
      };

      box.appendChild(div);
    }
  });
}

// ===== クイズ =====
function nextQuestion(){
  current=quizList[Math.floor(Math.random()*quizList.length)];

  document.getElementById("desc").innerText=current.desc;
  document.getElementById("answer").value="";
  document.getElementById("result").innerHTML="";
}

// ===== 回答 =====
function check(){
  const input=document.getElementById("answer").value;

  if(!input) return;

  if(normalize(input)===normalize(current.name)){
    score++;
    document.getElementById("score").innerText=score;

    document.getElementById("result").innerHTML=
      `<span class="correct">正解！</span>`;

    saveBest();

    setTimeout(nextQuestion,500);

  }else{
    document.getElementById("result").innerHTML=
      `<span class="wrong">不正解</span><br>答え：${current.name}`;

    score = 0;
    document.getElementById("score").innerText = 0;
  }
}

// ===== 記録 =====
function getKey(){
  const mode=document.getElementById("mode").value;
  const rarity=document.getElementById("rarity").value;
  const finalOnly=document.getElementById("finalOnly").checked;

  return `descQuiz_${mode}_${rarity}_${finalOnly}`;
}

function saveBest(){
  const key=getKey();
  const best=Number(localStorage.getItem(key)||0);

  if(score>best){
    localStorage.setItem(key,score);
    document.getElementById("best").innerText=score;
  }
}

function loadBest(){
  const key=getKey();
  const best=Number(localStorage.getItem(key)||0);

  document.getElementById("best").innerText=best;
}

// ===== 開始 =====
async function startQuiz(){
  score=0;
  document.getElementById("score").innerText=0;

  await loadData();
  loadBest();

  nextQuestion();
}

// Enterで回答
document.getElementById("answer").addEventListener("keydown",e=>{
  if(e.key==="Enter") check();
});

// 入力でサジェスト
document.getElementById("answer").addEventListener("input",updateSuggest);

  ["mode","rarity","finalOnly"].forEach(id=>{
  document.getElementById(id).addEventListener("change",()=>{
    resetQuiz();
  });
});

function resetQuiz(){
  score = 0;
  current = null;
  quizList = [];
  suggestList = [];

  document.getElementById("score").innerText = 0;
  document.getElementById("desc").innerText = "";
  document.getElementById("answer").value = "";
  document.getElementById("suggest").innerHTML = "";
  document.getElementById("result").innerHTML = "";

  loadBest();
}
</script>

</body>
</html>
