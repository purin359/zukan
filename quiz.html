<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>説明文クイズ</title>

<style>
body{
  font-family:sans-serif;
  padding:16px;
  max-width:600px;
  margin:auto;
}

input,select,button{
  font-size:16px;
  padding:10px;
  margin:5px 0;
  box-sizing:border-box;
}

select{
  flex:1;
  width:100%;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.modeButtons{
  display:flex;
  gap:6px;
  margin-bottom:8px;
}

.modeButtons button{
  flex:1;
  font-size:14px;
  padding:8px;
}

.modeButtons button.active{
  background:#2196F3;
}

.row{
  display:flex;
  gap:8px;
  align-items:center;
}

.scoreRow{
  display:flex;
  gap:20px;
  margin:8px 0;
  font-weight:bold;
}

#desc{
  border:1px solid #ccc;
  padding:12px;
  margin:10px 0;
  min-height:120px;
  white-space:pre-wrap;
  background:#fafafa;
}

#answer{
  width:100%;
}

#suggest{
  border:1px solid #ccc;
  max-height:150px;
  overflow-y:auto;
}

.sugItem{
  padding:6px;
  cursor:pointer;
}

.sugItem:hover{
  background:#eee;
}

.correct{color:blue; font-weight:bold;}
.wrong{color:red; font-weight:bold;}

#finalOnlyWrap{
  margin:8px 0;
}
</style>
</head>

<body>

<h2>説明文クイズ</h2>

<div class="modeButtons">
  <button id="allyBtn" class="active" onclick="setMode('ally')">味方</button>
  <button id="enemyBtn" onclick="setMode('enemy')">敵</button>
</div>

<div class="row">
  <select id="rarity">
    <option value="all">全て</option>
    <option value="basic">基本</option>
    <option value="ex">EX</option>
    <option value="rare">レア</option>
    <option value="superrare">激レア</option>
    <option value="ultrarare">超激レア</option>
    <option value="legendrare">伝説レア</option>
  </select>
</div>

<div id="finalOnlyWrap">
  <label>
    <input type="checkbox" id="finalOnly">
    最上位形態のみ
  </label>
</div>

<div class="scoreRow">
  <span>スコア：<span id="score">0</span></span>
  <span>最高記録：<span id="best">0</span></span>
</div>

<div id="desc">読み込み中...</div>

<input id="answer" placeholder="キャラ名">
<button onclick="check()">回答</button>

<div id="suggest"></div>
<div id="result"></div>

<script>
let quizList = [];
let suggestList = [];
let current = null;
let score = 0;
let mode = "ally";

// ===== 正規化 =====
function normalize(str){
  return (str || "")
    .replace(/\s/g,"")
    .replace(/　/g,"")
    .toLowerCase()
    .normalize("NFKC");
}

// ===== モード切替 =====
function setMode(newMode){
  mode = newMode;

  document.getElementById("allyBtn").classList.toggle("active", mode === "ally");
  document.getElementById("enemyBtn").classList.toggle("active", mode === "enemy");

  document.getElementById("rarity").style.display =
    mode === "ally" ? "block" : "none";

  document.getElementById("finalOnlyWrap").style.display =
    mode === "ally" ? "block" : "none";

  startQuiz();
}

// ===== データ取得 =====
async function loadData(){
  const rarity = document.getElementById("rarity").value;
  const finalOnly = document.getElementById("finalOnly").checked;

  if(mode === "enemy"){
    const enemy = await fetch("enemy.json")
      .then(r => r.json())
      .catch(() => []);

    quizList = enemy
      .filter(f => f.name && f.description)
      .map(f => ({
        name: f.name,
        desc: f.description || ""
      }));

  }else{
    const fileMap = {
      basic:"basic.json",
      ex:"ex.json",
      rare:"rare.json",
      superrare:"superrare.json",
      ultrarare:"ultrarare.json",
      legendrare:"legendrare.json"
    };

    const files =
      rarity === "all"
        ? Object.values(fileMap)
        : [fileMap[rarity]];

    const loaded = await Promise.all(
      files.map(file =>
        fetch(file).then(r => r.json()).catch(() => [])
      )
    );

    const ally = loaded.flat();

    quizList = ally.flatMap(ch => {
      let forms = ch.forms || [];

      if(finalOnly && forms.length > 0){
        forms = [forms[forms.length - 1]];
      }

      return forms
        .filter(f => f.name && f.description)
        .map(f => ({
          name: f.name,
          desc: f.description || ""
        }));
    });
  }

  suggestList = quizList.map(q => q.name);
}

// ===== 問題表示 =====
function nextQuestion(){
  if(quizList.length === 0){
    current = null;
    document.getElementById("desc").innerText = "問題データがありません";
    return;
  }

  current = quizList[Math.floor(Math.random() * quizList.length)];

  document.getElementById("desc").innerText = current.desc;
  document.getElementById("answer").value = "";
  document.getElementById("suggest").innerHTML = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").focus();
}

// ===== 回答 =====
function check(){
  if(!current) return;

  const input = document.getElementById("answer").value.trim();
  if(!input) return;

  if(normalize(input) === normalize(current.name)){
    score++;
    document.getElementById("score").innerText = score;

    document.getElementById("result").innerHTML =
      `<span class="correct">正解！</span>`;

    saveBest();

    setTimeout(nextQuestion, 500);

  }else{
    document.getElementById("result").innerHTML =
      `<span class="wrong">不正解</span><br>答え：${current.name}`;

    score = 0;
    document.getElementById("score").innerText = 0;
  }
}

// ===== サジェスト =====
function updateSuggest(){
  const input = document.getElementById("answer").value;
  const key = normalize(input);
  const box = document.getElementById("suggest");

  box.innerHTML = "";

  if(!key) return;

  suggestList
    .filter(name => normalize(name).includes(key))
    .slice(0, 20)
    .forEach(name => {
      const div = document.createElement("div");
      div.className = "sugItem";
      div.innerText = name;

      div.onclick = () => {
        document.getElementById("answer").value = name;
        box.innerHTML = "";
        document.getElementById("answer").focus();
      };

      box.appendChild(div);
    });
}

// ===== 記録 =====
function getKey(){
  const rarity = document.getElementById("rarity").value;
  const finalOnly = document.getElementById("finalOnly").checked;

  return `descQuiz_${mode}_${rarity}_${finalOnly}`;
}

function saveBest(){
  const key = getKey();
  const best = Number(localStorage.getItem(key) || 0);

  if(score > best){
    localStorage.setItem(key, score);
    document.getElementById("best").innerText = score;
  }
}

function loadBest(){
  const key = getKey();
  const best = Number(localStorage.getItem(key) || 0);
  document.getElementById("best").innerText = best;
}

// ===== 開始・リセット =====
async function startQuiz(){
  score = 0;
  current = null;
  quizList = [];
  suggestList = [];

  document.getElementById("score").innerText = 0;
  document.getElementById("desc").innerText = "読み込み中...";
  document.getElementById("answer").value = "";
  document.getElementById("suggest").innerHTML = "";
  document.getElementById("result").innerHTML = "";

  await loadData();
  loadBest();
  nextQuestion();
}

window.addEventListener("load", () => {
  const answer = document.getElementById("answer");
  const rarity = document.getElementById("rarity");
  const finalOnly = document.getElementById("finalOnly");

  answer.addEventListener("keydown", e => {
    if(e.key === "Enter"){
      check();
    }
  });

  answer.addEventListener("input", updateSuggest);

  rarity.addEventListener("change", startQuiz);
  finalOnly.addEventListener("change", startQuiz);

  startQuiz();
});
</script>

</body>
</html>
