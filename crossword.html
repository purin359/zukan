<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高密度キャラ名クロスワード</title>
<style>
body{
  font-family:sans-serif;
  padding:16px;
  max-width:900px;
  margin:auto;
}

button,select,input{
  font-size:16px;
  padding:8px;
  margin:4px;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
}

#grid{
  display:grid;
  gap:1px;
  margin-top:16px;
  justify-content:start;
  background:#000;
  padding:4px;
  overflow:auto;
}

.cell{
  width:26px;
  height:26px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:bold;
}

.empty{
  background:#000;
}

#used{
  margin-top:16px;
  line-height:1.6;
}
</style>
</head>
<body>

<h2>高密度キャラ名クロスワード試作</h2>

<select id="rarity">
  <option value="all">全て</option>
  <option value="basic">基本</option>
  <option value="ex">EX</option>
  <option value="rare">レア</option>
  <option value="superrare">激レア</option>
  <option value="ultrarare">超激レア</option>
  <option value="legendrare">伝説レア</option>
</select>

<label>
  目標単語数
  <input id="wordCount" type="number" value="80" min="10" max="200">
</label>

<label>
  試行回数
  <input id="tryCount" type="number" value="300" min="10" max="2000">
</label>

<button onclick="makeCrossword()">作成</button>

<div id="status"></div>
<div id="grid"></div>
<div id="used"></div>

<script>
const SIZE = 35;
let allNames = [];

async function loadNames(){
  const fileMap = {
    basic:"basic.json",
    ex:"ex.json",
    rare:"rare.json",
    superrare:"superrare.json",
    ultrarare:"ultrarare.json",
    legendrare:"legendrare.json"
  };

  const rarity = document.getElementById("rarity").value;

  const files = rarity === "all"
    ? Object.values(fileMap)
    : [fileMap[rarity]];

  const loaded = await Promise.all(
    files.map(file => fetch(file).then(r=>r.json()).catch(()=>[]))
  );

  const data = loaded.flat();

  allNames = [];

  data.forEach(ch=>{
    (ch.forms || []).forEach(f=>{
      if(f.name){
        allNames.push(cleanName(f.name));
      }
    });
  });

  allNames = [...new Set(allNames)]
    .filter(n => n.length >= 2 && n.length <= 16);
}

function cleanName(name){
  return String(name)
    .replace(/\s+/g,"")
    .replace(/　/g,"")
    .replace(/\n/g,"")
    .trim();
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random() - 0.5);
}

function createBoard(){
  return Array.from({length:SIZE},()=>Array(SIZE).fill(""));
}

function cloneBoard(board){
  return board.map(row => [...row]);
}

function inBoard(x,y){
  return x >= 0 && y >= 0 && x < SIZE && y < SIZE;
}

function canPlace(board, word, x, y, dir){
  const dx = dir === "H" ? 1 : 0;
  const dy = dir === "V" ? 1 : 0;

  for(let i=0;i<word.length;i++){
    const nx = x + dx*i;
    const ny = y + dy*i;

    if(!inBoard(nx,ny)) return false;

    const cell = board[ny][nx];
    if(cell && cell !== word[i]) return false;
  }

  const beforeX = x - dx;
  const beforeY = y - dy;
  const afterX = x + dx * word.length;
  const afterY = y + dy * word.length;

  if(inBoard(beforeX,beforeY) && board[beforeY][beforeX]) return false;
  if(inBoard(afterX,afterY) && board[afterY][afterX]) return false;

  for(let i=0;i<word.length;i++){
    const nx = x + dx*i;
    const ny = y + dy*i;

    const isCross = board[ny][nx] === word[i];

    if(dir === "H"){
      if(!isCross){
        if(inBoard(nx,ny-1) && board[ny-1][nx]) return false;
        if(inBoard(nx,ny+1) && board[ny+1][nx]) return false;
      }
    }else{
      if(!isCross){
        if(inBoard(nx-1,ny) && board[ny][nx-1]) return false;
        if(inBoard(nx+1,ny) && board[ny][nx+1]) return false;
      }
    }
  }

  return true;
}

function placeWord(board, word, x, y, dir){
  const dx = dir === "H" ? 1 : 0;
  const dy = dir === "V" ? 1 : 0;

  for(let i=0;i<word.length;i++){
    board[y + dy*i][x + dx*i] = word[i];
  }
}

function countCross(board, word, x, y, dir){
  const dx = dir === "H" ? 1 : 0;
  const dy = dir === "V" ? 1 : 0;
  let count = 0;

  for(let i=0;i<word.length;i++){
    const nx = x + dx*i;
    const ny = y + dy*i;

    if(board[ny][nx] === word[i]) count++;
  }

  return count;
}

function centerScore(word, x, y, dir){
  const dx = dir === "H" ? 1 : 0;
  const dy = dir === "V" ? 1 : 0;

  const endX = x + dx * (word.length - 1);
  const endY = y + dy * (word.length - 1);

  const cx = (x + endX) / 2;
  const cy = (y + endY) / 2;

  const center = SIZE / 2;
  const dist = Math.abs(cx - center) + Math.abs(cy - center);

  return SIZE - dist;
}

function getBounds(board){
  let minX = SIZE, minY = SIZE, maxX = 0, maxY = 0;
  let filled = 0;

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      if(board[y][x]){
        filled++;
        minX = Math.min(minX,x);
        minY = Math.min(minY,y);
        maxX = Math.max(maxX,x);
        maxY = Math.max(maxY,y);
      }
    }
  }

  if(filled === 0){
    return {minX:0,minY:0,maxX:0,maxY:0,area:0,filled:0};
  }

  return {
    minX,minY,maxX,maxY,
    area:(maxX-minX+1) * (maxY-minY+1),
    filled
  };
}

function findBestPlace(board, word){
  const candidates = [];

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const cell = board[y][x];
      if(!cell) continue;

      for(let i=0;i<word.length;i++){
        if(word[i] !== cell) continue;

        candidates.push({x:x-i,y,dir:"H"});
        candidates.push({x,y:y-i,dir:"V"});
      }
    }
  }

  let best = null;
  let bestScore = -Infinity;

  shuffle(candidates).forEach(p=>{
    if(!canPlace(board, word, p.x, p.y, p.dir)) return;

    const cross = countCross(board, word, p.x, p.y, p.dir);
    const center = centerScore(word, p.x, p.y, p.dir);

    const score =
      cross * 1000 +
      word.length * 12 +
      center * 3 +
      Math.random();

    if(score > bestScore){
      bestScore = score;
      best = p;
    }
  });

  return best;
}

function makeOne(words, targetCount){
  const board = createBoard();
  const used = [];

  words.sort((a,b)=>b.length-a.length);

  const first = words.shift();
  const startX = Math.floor((SIZE - first.length) / 2);
  const startY = Math.floor(SIZE / 2);

  placeWord(board, first, startX, startY, "H");
  used.push(first);

  let retryWords = shuffle(words);

  for(let pass=0; pass<3; pass++){
    for(const word of retryWords){
      if(used.length >= targetCount) break;
      if(used.includes(word)) continue;

      const pos = findBestPlace(board, word);

      if(pos){
        placeWord(board, word, pos.x, pos.y, pos.dir);
        used.push(word);
      }
    }

    retryWords = shuffle(words);
  }

  const bounds = getBounds(board);

  const score =
    used.length * 10000 +
    bounds.filled * 50 -
    bounds.area;

  return {
    board: cloneBoard(board),
    used:[...used],
    score,
    bounds
  };
}

async function makeCrossword(){
  document.getElementById("status").innerText = "生成中...";
  await loadNames();

  const targetCount = Number(document.getElementById("wordCount").value || 80);
  const tryCount = Number(document.getElementById("tryCount").value || 300);

  let best = null;

  for(let t=0;t<tryCount;t++){
    const words = shuffle(allNames).slice(0, targetCount * 4);
    const result = makeOne(words, targetCount);

    if(!best || result.score > best.score){
      best = result;
    }

    if(t % 20 === 0){
      document.getElementById("status").innerText =
        `生成中... ${t}/${tryCount}`;
      await new Promise(r=>setTimeout(r,0));
    }
  }

  document.getElementById("status").innerText =
    `完成：${best.used.length}個配置`;

  drawBoard(best.board, best.bounds);
  showUsed(best.used);
}

function drawBoard(board, bounds){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const minX = Math.max(0, bounds.minX - 1);
  const minY = Math.max(0, bounds.minY - 1);
  const maxX = Math.min(SIZE - 1, bounds.maxX + 1);
  const maxY = Math.min(SIZE - 1, bounds.maxY + 1);

  const width = maxX - minX + 1;

  grid.style.gridTemplateColumns = `repeat(${width}, 26px)`;

  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      const div = document.createElement("div");
      const cell = board[y][x];

      div.className = cell ? "cell" : "cell empty";
      div.textContent = cell;

      grid.appendChild(div);
    }
  }
}

function showUsed(used){
  document.getElementById("used").innerHTML =
    `<b>配置できた名前：${used.length}個</b><br>` +
    used.join("、");
}

window.addEventListener("load", makeCrossword);
</script>

</body>
</html>
