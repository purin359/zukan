<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クロスワード盤面作成</title>
<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f6fa;
}

h1{
  text-align:center;
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

input, button{
  font-size:16px;
  padding:8px;
  margin:4px;
}

#board{
  display:grid;
  justify-content:center;
  gap:0px;
  margin-top:20px;
}

.cell{
  width:40px;
  height:40px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  border:1px solid #333;
  margin-left:-1px;
  margin-top:-1px;
  background:white;
  box-sizing:border-box;
}
  
.cell.black{
  background:#222;
  color:#222;
}

.cell input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-sizing:border-box;
  background:transparent;
}

.cell input:focus{
  outline:2px solid #4CAF50;
}

.mode{
  margin-top:10px;
}
</style>
</head>

<body>

<h1>クロスワード盤面作成</h1>

<div class="controls">
  縦：
  <input type="number" id="rows" value="10" min="1" max="30">
  横：
  <input type="number" id="cols" value="10" min="1" max="30">
  <button onclick="createBoard()">盤面作成</button>
  <button onclick="clearLetters()">文字だけ消す</button>
  <button onclick="resetBoard()">全部リセット</button>

  <div class="mode">
    <label>
      <input type="radio" name="mode" value="letter" checked>
      文字入力
    </label>
    <label>
      <input type="radio" name="mode" value="black">
      黒マス指定
    </label>
  </div>
</div>

<div id="board"></div>

<script>
let boardData = [];
let rowCount = 10;
let colCount = 10;

function getMode(){
  return document.querySelector('input[name="mode"]:checked').value;
}

function createBoard(){
  rowCount = Number(document.getElementById("rows").value);
  colCount = Number(document.getElementById("cols").value);

  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  board.style.gridTemplateColumns = `repeat(${colCount}, 40px)`;

  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      if(boardData[r][c] === "#"){
        cell.classList.add("black");
      }

      cell.addEventListener("click", () => {
        if(getMode() === "black"){
          boardData[r][c] = boardData[r][c] === "#" ? "" : "#";
          renderBoard();
        }
      });

      if(boardData[r][c] !== "#"){
        const input = document.createElement("input");
        input.maxLength = 1;
        input.value = boardData[r][c];

        input.addEventListener("input", () => {
          boardData[r][c] = input.value;
        });

        cell.appendChild(input);
      }

      board.appendChild(cell);
    }
  }
}

function clearLetters(){
  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      if(boardData[r][c] !== "#"){
        boardData[r][c] = "";
      }
    }
  }
  renderBoard();
}

function resetBoard(){
  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );
  renderBoard();
}

createBoard();
</script>

</body>
</html>
