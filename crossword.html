<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クロスワード盤面作成</title>
<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f6fa;
}

h1{
  text-align:center;
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

input, button{
  font-size:16px;
  padding:8px;
  margin:4px;
}

#board{
  display:grid;
  justify-content:center;
  gap:0px;
  margin-top:20px;
}

.cell{
  width:40px;
  height:40px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  border:1px solid #333;
  margin-left:-1px;
  margin-top:-1px;
  background:white;
  box-sizing:border-box;
}
  
.cell.black{
  background:#222;
  color:#222;
}

.cell input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-sizing:border-box;
  background:transparent;
}

.cell input:focus{
  outline:2px solid #4CAF50;
}

.mode{
  margin-top:10px;
}
</style>
</head>

<body>

<h1>クロスワード盤面作成</h1>

<div class="controls">
  縦：
  <input type="number" id="rows" value="10" min="1" max="30">
  横：
  <input type="number" id="cols" value="10" min="1" max="30">
  <button onclick="createBoard()">盤面作成</button>
  <button onclick="clearLetters()">文字だけ消す</button>
  <button onclick="resetBoard()">全部リセット</button>

  <div class="saveArea">
  <input type="text" id="boardName" placeholder="盤面名">

  <button onclick="saveCurrentBoard()">保存</button>

  <select id="savedBoards" onchange="loadBoard()">
    <option value="">保存済み盤面を選択</option>
  </select>

  <button onclick="deleteBoard()">削除</button>
</div>

  <div class="mode">
    <label>
      <input type="radio" name="mode" value="letter" checked>
      文字入力
    </label>
    <label>
      <input type="radio" name="mode" value="black">
      黒マス指定
    </label>
  </div>
</div>

<div id="board"></div>

<script>
let boardData = [];
let rowCount = 10;
let colCount = 10;

function getMode(){
  return document.querySelector('input[name="mode"]:checked').value;
}

function createBoard(){
  rowCount = Number(document.getElementById("rows").value);
  colCount = Number(document.getElementById("cols").value);

  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  board.style.gridTemplateColumns = `repeat(${colCount}, 40px)`;

  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      if(boardData[r][c] === "#"){
        cell.classList.add("black");
      }

      cell.addEventListener("click", () => {
        if(getMode() === "black"){
          boardData[r][c] = boardData[r][c] === "#" ? "" : "#";
          renderBoard();
        }
      });

      if(boardData[r][c] !== "#"){
        const input = document.createElement("input");
        input.maxLength = 1;
        input.value = boardData[r][c];

        input.addEventListener("input", () => {
          boardData[r][c] = input.value;
        });

        cell.appendChild(input);
      }

      board.appendChild(cell);
    }
  }
}

function clearLetters(){
  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      if(boardData[r][c] !== "#"){
        boardData[r][c] = "";
      }
    }
  }
  renderBoard();
}

function resetBoard(){
  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );
  renderBoard();
}

/* ===== 保存機能 ===== */

function getSavedBoards(){
  return JSON.parse(localStorage.getItem("crosswordBoards") || "{}");
}

function saveBoards(boards){
  localStorage.setItem("crosswordBoards", JSON.stringify(boards));
}

function saveCurrentBoard(){
  const name = document.getElementById("boardName").value.trim();

  if(!name){
    alert("盤面名を入力してください");
    return;
  }

  const boards = getSavedBoards();

  boards[name] = {
    rows: rowCount,
    cols: colCount,
    data: boardData
  };

  saveBoards(boards);
  updateBoardList();

  alert("保存しました");
}

function loadBoard(){
  const select = document.getElementById("savedBoards");
  const name = select.value;

  if(!name) return;

  const boards = getSavedBoards();
  const saved = boards[name];

  rowCount = saved.rows;
  colCount = saved.cols;
  boardData = saved.data;

  document.getElementById("rows").value = rowCount;
  document.getElementById("cols").value = colCount;
  document.getElementById("boardName").value = name;

  renderBoard();
}

function deleteBoard(){
  const select = document.getElementById("savedBoards");
  const name = select.value;

  if(!name){
    alert("削除する盤面を選んでください");
    return;
  }

  if(!confirm(`「${name}」を削除しますか？`)) return;

  const boards = getSavedBoards();
  delete boards[name];

  saveBoards(boards);
  updateBoardList();

  alert("削除しました");
}

function updateBoardList(){
  const select = document.getElementById("savedBoards");
  select.innerHTML = '<option value="">保存済み盤面を選択</option>';

  const boards = getSavedBoards();

  Object.keys(boards).forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

createBoard();
updateBoardList();
</script>

</body>
</html>
