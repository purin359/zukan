<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロスワード盤面作成</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.controls{
  text-align:center;
  margin-bottom:12px;
}

input,button,select{
  font-size:16px;
  padding:6px 10px;
  margin:4px;
}

.mode{
  margin-top:8px;
}

#board{
  display:grid;
  justify-content:center;
  gap:0;
  margin-top:20px;
}

.cell{
  width:40px;
  height:40px;
  border:1px solid #333;
  margin-left:-1px;
  margin-top:-1px;
  background:white;
  box-sizing:border-box;
}

.cell.black{
  background:#222;
}

.cell input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  background:transparent;
  box-sizing:border-box;
}

.cell input:focus{
  outline:2px solid #4CAF50;
  position:relative;
  z-index:1;
}

.searchBar{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  margin:16px 0 8px 0;
}

.searchBar input{
  height:32px;
  font-size:14px;
  padding:4px 8px;
}

.smallInput{
  width:70px;
}

#searchText{
  width:140px;
}

.searchBar button{
  height:32px;
  padding:0 12px;
}

#searchCount{
  margin:6px 0;
  font-size:14px;
}

#searchResults{
  display:flex;
  flex-wrap:wrap;
  gap:6px 0;
}

.resultItem{
  font-size:14px;
  padding:0 8px;
  border-right:1px solid #999;
}

.resultItem:first-child{
  padding-left:0;
}

.resultItem:last-child{
  border-right:none;
}

.saveArea{
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>クロスワード盤面作成</h1>

  <div class="searchBar">

  <input type="number" id="searchLength" placeholder="文字数" class="smallInput">

  <input type="text" id="searchText" placeholder="検索文字">

  <input type="number" id="searchPos" placeholder="位置" class="smallInput">

  <label>
    <input type="checkbox" id="startsWithCheck">
    頭
  </label>

  <label>
    <input type="checkbox" id="endsWithCheck">
    末尾
  </label>

  <button onclick="searchCharacters()">検索</button>

</div>

<p id="searchCount"></p>

<div id="searchResults"></div>


<div class="controls">

  縦：
  <input type="number" id="rows" value="10" min="1" max="30">

  横：
  <input type="number" id="cols" value="10" min="1" max="30">

  <button onclick="createBoard()">盤面作成</button>

  <button onclick="clearLetters()">文字だけ消す</button>

  <button onclick="resetBoard()">全部リセット</button>

  <div class="mode">
    <label>
      <input type="radio" name="mode" value="letter" checked>
      文字入力
    </label>

    <label>
      <input type="radio" name="mode" value="black">
      黒マス指定
    </label>
  </div>

</div>

<div class="saveArea">

  <input type="text" id="boardName" placeholder="盤面名">

  <button onclick="saveCurrentBoard()">保存</button>

  <select id="savedBoards" onchange="loadBoard()">
    <option value="">保存済み盤面</option>
  </select>

  <button onclick="deleteBoard()">削除</button>

</div>

<div id="board"></div>

<script>
let boardData = [];
let rowCount = 10;
let colCount = 10;

let characterNames = [];

const jsonFiles = [
  "basic.json",
  "EX.json",
  "rare.json",
  "superrare.json",
  "ultrarare.json",
  "legendrare.json"
];

function getMode(){
  return document.querySelector('input[name="mode"]:checked').value;
}

function createBoard(){

  rowCount = Number(document.getElementById("rows").value);
  colCount = Number(document.getElementById("cols").value);

  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

function renderBoard(){

  const board = document.getElementById("board");

  board.innerHTML = "";

  board.style.gridTemplateColumns =
    `repeat(${colCount}, 40px)`;

  for(let r = 0; r < rowCount; r++){

    for(let c = 0; c < colCount; c++){

      const cell = document.createElement("div");

      cell.className = "cell";

      if(boardData[r][c] === "#"){
        cell.classList.add("black");
      }

      cell.addEventListener("click", () => {

        if(getMode() === "black"){

          boardData[r][c] =
            boardData[r][c] === "#" ? "" : "#";

          renderBoard();
        }

      });

      if(boardData[r][c] !== "#"){

        const input = document.createElement("input");

        input.maxLength = 1;

        input.value = boardData[r][c];

        input.addEventListener("input", () => {
          boardData[r][c] = input.value;
        });

        cell.appendChild(input);
      }

      board.appendChild(cell);
    }
  }
}

function clearLetters(){

  for(let r = 0; r < rowCount; r++){

    for(let c = 0; c < colCount; c++){

      if(boardData[r][c] !== "#"){
        boardData[r][c] = "";
      }

    }
  }

  renderBoard();
}

function resetBoard(){

  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

/* 保存 */

function getSavedBoards(){
  return JSON.parse(
    localStorage.getItem("crosswordBoards") || "{}"
  );
}

function saveBoards(boards){
  localStorage.setItem(
    "crosswordBoards",
    JSON.stringify(boards)
  );
}

function saveCurrentBoard(){

  const name =
    document.getElementById("boardName").value.trim();

  if(!name){
    alert("盤面名を入力してください");
    return;
  }

  const boards = getSavedBoards();

  boards[name] = {
    rows: rowCount,
    cols: colCount,
    data: boardData
  };

  saveBoards(boards);

  updateBoardList();

  alert("保存しました");
}

function loadBoard(){

  const name =
    document.getElementById("savedBoards").value;

  if(!name) return;

  const boards = getSavedBoards();

  const saved = boards[name];

  rowCount = saved.rows;
  colCount = saved.cols;
  boardData = saved.data;

  document.getElementById("rows").value = rowCount;
  document.getElementById("cols").value = colCount;
  document.getElementById("boardName").value = name;

  renderBoard();
}

function deleteBoard(){

  const name =
    document.getElementById("savedBoards").value;

  if(!name){
    alert("削除する盤面を選択してください");
    return;
  }

  if(!confirm(`「${name}」を削除しますか？`)) return;

  const boards = getSavedBoards();

  delete boards[name];

  saveBoards(boards);

  updateBoardList();
}

function updateBoardList(){

  const select =
    document.getElementById("savedBoards");

  select.innerHTML =
    '<option value="">保存済み盤面</option>';

  const boards = getSavedBoards();

  Object.keys(boards).forEach(name => {

    const option = document.createElement("option");

    option.value = name;
    option.textContent = name;

    select.appendChild(option);

  });
}

/* JSON読み込み */

async function loadCharacterNames(){

  characterNames = [];

  for(const file of jsonFiles){

    try{

      const res = await fetch(file);

      const data = await res.json();

      data.forEach(char => {

        if(char.forms){

          char.forms.forEach(form => {

            if(form.name){

              characterNames.push({
                name: form.name
              });

            }

          });

        }

      });

    }catch(e){

      console.warn(file + " 読み込み失敗");

    }

  }

}

/* 検索 */

function searchCharacters(){

  const lengthValue =
    document.getElementById("searchLength").value;

  const text =
    document.getElementById("searchText")
      .value
      .trim();

  const posValue =
    document.getElementById("searchPos").value;

  const startsWith =
    document.getElementById("startsWithCheck").checked;

  const endsWith =
    document.getElementById("endsWithCheck").checked;

  let results = characterNames.filter(item => {

    const name = item.name;

    if(lengthValue){

      if(name.length !== Number(lengthValue)){
        return false;
      }

    }

    if(text){

      if(startsWith){

        if(!name.startsWith(text)){
          return false;
        }

      }else if(endsWith){

        if(!name.endsWith(text)){
          return false;
        }

      }else if(posValue){

        const pos = Number(posValue) - 1;

        if(name.indexOf(text) !== pos){
          return false;
        }

      }else{

        if(!name.includes(text)){
          return false;
        }

      }

    }

    return true;

  });

  displaySearchResults(results);
}

function displaySearchResults(results){

  document.getElementById("searchCount").textContent =
    results.length + "件";

  const area =
    document.getElementById("searchResults");

  area.innerHTML = "";

  results.forEach(item => {

    const div = document.createElement("div");

    div.className = "resultItem";

    div.textContent = item.name;

    area.appendChild(div);

  });
}

window.addEventListener("load", async () => {

  createBoard();

  updateBoardList();

  await loadCharacterNames();

});
</script>

</body>
</html>
