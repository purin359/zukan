<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロスワード盤面作成</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --cell-size:28px;
  --cell-font:16px;
}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
  padding:6px;
}

h1{
  text-align:center;
  font-size:20px;
  margin:6px 0;
}

input,button,select{
  font-size:13px;
  padding:3px 5px;
  margin:2px;
}

.searchBar,
.controls,
.saveArea{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:3px;
  margin:4px 0;
}

.smallInput{
  width:55px;
}

#searchText{
  width:110px;
}

#rows,
#cols{
  width:50px;
}

#boardName{
  width:100px;
}

#savedBoards{
  width:120px;
}

.insertArea{
  font-size:13px;
}

#searchCount{
  margin:2px 0;
  font-size:12px;
  text-align:center;
}

#searchResults{
  display:flex;
  flex-wrap:wrap;
  gap:3px 0;
  max-height:42px;
  overflow:auto;
  margin-bottom:4px;
}

.resultItem{
  font-size:12px;
  padding:0 6px;
  border-right:1px solid #999;
  cursor:pointer;
}

.resultItem:last-child{
  border-right:none;
}

.resultItem:hover{
  background:#fff3b0;
}

.boardWrap{
  width:100%;
  overflow:auto;
  padding-bottom:8px;
}

#board{
  display:grid;
  gap:0;
  margin:6px auto 0;
  width:max-content;
  border-left:1px solid #333;
  border-top:1px solid #333;
}

.cell{
  width:var(--cell-size);
  height:var(--cell-size);
  border-right:1px solid #333;
  border-bottom:1px solid #333;
  background:white;
  box-sizing:border-box;
}

.cell.black{
  background:#222;
}

.cell input{
  width:100%;
  height:100%;
  border:none;
  padding:0;
  margin:0;
  text-align:center;
  font-size:var(--cell-font);
  font-weight:bold;
  line-height:1;
  background:transparent;
  box-sizing:border-box;
}

.cell input:focus{
  outline:2px solid #4CAF50;
  position:relative;
  z-index:1;
}

@media (max-width:700px){
  :root{
    --cell-size:18px;
    --cell-font:10px;
  }

  body{
    padding:2px;
  }

  h1{
    font-size:14px;
    margin:1px 0 2px;
  }

  input,button,select,label{
    font-size:9px;
  }

  input,button,select{
    padding:0 2px;
    min-height:18px;
    margin:0;
  }

  .searchBar,
  .controls,
  .saveArea{
    gap:1px;
    margin:1px 0;
  }

  #searchText{
    width:62px;
  }

  .smallInput,
  #rows,
  #cols{
    width:30px;
  }

  #boardName{
    width:52px;
  }

  #savedBoards{
    width:70px;
  }

  .insertArea{
    font-size:9px;
  }

  #searchResults{
    max-height:24px;
    margin-bottom:1px;
  }

  .resultItem{
    font-size:9px;
    padding:0 3px;
  }

  #board{
    margin-top:2px;
  }
}

@media (min-width:900px){
  :root{
    --cell-size:32px;
    --cell-font:18px;
  }

  body{
    padding:12px;
  }

  h1{
    font-size:28px;
    margin:8px 0 12px;
  }

  input,button,select,label{
    font-size:16px;
  }

  input,button,select{
    padding:4px 8px;
    min-height:34px;
  }

  .searchBar,
  .controls,
  .saveArea{
    gap:6px;
    margin:6px 0;
  }

  #searchText{
    width:180px;
  }

  .smallInput{
    width:70px;
  }

  #rows,
  #cols{
    width:60px;
  }

  #boardName{
    width:140px;
  }

  #savedBoards{
    width:180px;
  }

  .insertArea{
    font-size:15px;
  }

  #searchResults{
    max-height:60px;
  }

  .resultItem{
    font-size:14px;
    padding:0 8px;
  }
}
</style>
</head>

<body>

<h1>クロスワード盤面作成</h1>

<div class="searchBar">
  <input type="number" id="searchLength" placeholder="文字数" class="smallInput">
  <input type="text" id="searchText" placeholder="検索文字">
  <input type="number" id="searchPos" placeholder="位置" class="smallInput">

  <label><input type="checkbox" id="startsWithCheck">頭</label>
  <label><input type="checkbox" id="endsWithCheck">末尾</label>

  <button onclick="searchCharacters()">検索</button>

  <div class="insertArea">
    選択中：<span id="selectedWordText">なし</span>
    <label><input type="radio" name="insertDirection" value="horizontal" checked>横</label>
    <label><input type="radio" name="insertDirection" value="vertical">縦</label>
    <button onclick="clearSelectedWord()">解除</button>
  </div>
</div>

<p id="searchCount"></p>
<div id="searchResults"></div>

<div class="controls">
  縦：<input type="number" id="rows" value="10" min="1" max="50">
  横：<input type="number" id="cols" value="10" min="1" max="50">

  <button onclick="createBoard()">作成</button>
  <button onclick="clearLetters()">文字消去</button>
  <button onclick="resetBoard()">全消去</button>
  <button onclick="saveBoardImage()">画像保存</button>

  <label><input type="radio" name="mode" value="letter" checked>文字</label>
  <label><input type="radio" name="mode" value="black">黒マス</label>
</div>

<div class="saveArea">
  <input type="text" id="boardName" placeholder="盤面名">
  <button onclick="saveCurrentBoard()">保存</button>

  <select id="savedBoards" onchange="loadBoard()">
    <option value="">保存済み盤面</option>
  </select>

  <button onclick="deleteBoard()">削除</button>
</div>

<div class="boardWrap">
  <div id="board"></div>
</div>

<script>
let boardData = [];
let rowCount = 10;
let colCount = 10;
let selectedWord = "";
let characterNames = [];

const jsonFiles = [
  "basic.json",
  "ex.json",
  "rare.json",
  "superrare.json",
  "ultrarare.json",
  "legendrare.json"
];

function getCellSize(){
  return parseInt(
    getComputedStyle(document.documentElement)
      .getPropertyValue("--cell-size")
  );
}

function getMode(){
  return document.querySelector('input[name="mode"]:checked').value;
}

function getInsertDirection(){
  return document.querySelector('input[name="insertDirection"]:checked').value;
}

function createBoard(){
  rowCount = Number(document.getElementById("rows").value);
  colCount = Number(document.getElementById("cols").value);

  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

function renderBoard(){
  const board = document.getElementById("board");
  const cellSize = getCellSize();

  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${colCount}, ${cellSize}px)`;

  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      if(boardData[r][c] === "#"){
        cell.classList.add("black");
      }

      cell.addEventListener("click", () => {
        if(getMode() === "black"){
          boardData[r][c] = boardData[r][c] === "#" ? "" : "#";
          renderBoard();
          return;
        }

        if(getMode() === "letter" && selectedWord){
          insertWord(r, c);
        }
      });

      if(boardData[r][c] !== "#"){
        const input = document.createElement("input");

        input.className = "cellInput";
        input.dataset.row = r;
        input.dataset.col = c;
        input.maxLength = 1;
        input.value = boardData[r][c];

        input.addEventListener("input", () => {
          boardData[r][c] = input.value;
        });

        input.addEventListener("click", (e) => {
          e.stopPropagation();
        });

        input.addEventListener("keydown", (e) => {
          let nr = r;
          let nc = c;

          if(e.key === "ArrowUp") nr--;
          else if(e.key === "ArrowDown") nr++;
          else if(e.key === "ArrowLeft") nc--;
          else if(e.key === "ArrowRight") nc++;
          else return;

          e.preventDefault();
          focusCell(nr, nc);
        });

        cell.appendChild(input);
      }

      board.appendChild(cell);
    }
  }
}

function insertWord(startRow, startCol){
  if(!selectedWord) return;

  const dir = getInsertDirection();

  for(let i = 0; i < selectedWord.length; i++){
    const r = dir === "vertical" ? startRow + i : startRow;
    const c = dir === "horizontal" ? startCol + i : startCol;

    if(r >= rowCount || c >= colCount){
      alert("盤面からはみ出します");
      return;
    }

    const current = boardData[r][c];
    const newChar = selectedWord[i];

    if(current === "#"){
      alert("黒マスに重なっています");
      return;
    }

    if(current !== "" && current !== newChar){
      alert(`文字が重なっています\n(${current} と ${newChar})`);
      return;
    }
  }

  for(let i = 0; i < selectedWord.length; i++){
    const r = dir === "vertical" ? startRow + i : startRow;
    const c = dir === "horizontal" ? startCol + i : startCol;

    boardData[r][c] = selectedWord[i];
  }

  renderBoard();
}

function focusCell(r, c){
  if(r < 0 || r >= rowCount || c < 0 || c >= colCount) return;
  if(boardData[r][c] === "#") return;

  const input = document.querySelector(
    `.cellInput[data-row="${r}"][data-col="${c}"]`
  );

  if(input){
    input.focus();
    input.select();
  }
}

function clearLetters(){
  for(let r = 0; r < rowCount; r++){
    for(let c = 0; c < colCount; c++){
      if(boardData[r][c] !== "#"){
        boardData[r][c] = "";
      }
    }
  }

  renderBoard();
}

function resetBoard(){
  boardData = Array.from({length: rowCount}, () =>
    Array.from({length: colCount}, () => "")
  );

  renderBoard();
}

function getSavedBoards(){
  return JSON.parse(localStorage.getItem("crosswordBoards") || "{}");
}

function saveBoards(boards){
  localStorage.setItem("crosswordBoards", JSON.stringify(boards));
}

function saveCurrentBoard(){
  const name = document.getElementById("boardName").value.trim();

  if(!name){
    alert("盤面名を入力してください");
    return;
  }

  const boards = getSavedBoards();

  boards[name] = {
    rows: rowCount,
    cols: colCount,
    data: boardData
  };

  saveBoards(boards);
  updateBoardList();

  alert("保存しました");
}

function loadBoard(){
  const name = document.getElementById("savedBoards").value;
  if(!name) return;

  const boards = getSavedBoards();
  const saved = boards[name];

  rowCount = saved.rows;
  colCount = saved.cols;
  boardData = saved.data;

  document.getElementById("rows").value = rowCount;
  document.getElementById("cols").value = colCount;
  document.getElementById("boardName").value = name;

  renderBoard();
}

function deleteBoard(){
  const name = document.getElementById("savedBoards").value;

  if(!name){
    alert("削除する盤面を選択してください");
    return;
  }

  if(!confirm(`「${name}」を削除しますか？`)) return;

  const boards = getSavedBoards();
  delete boards[name];

  saveBoards(boards);
  updateBoardList();
}

function updateBoardList(){
  const select = document.getElementById("savedBoards");
  select.innerHTML = '<option value="">保存済み盤面</option>';

  const boards = getSavedBoards();

  Object.keys(boards).forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

async function loadCharacterNames(){
  characterNames = [];

  for(const file of jsonFiles){
    try{
      const res = await fetch(file);
      const data = await res.json();

      data.forEach(char => {
        if(char.forms){
          char.forms.forEach(form => {
            if(form.name){
              characterNames.push({ name: form.name });
            }
          });
        }
      });
    }catch(e){
      console.warn(file + " 読み込み失敗");
    }
  }
}

function searchCharacters(){
  const lengthValue = document.getElementById("searchLength").value;
  const text = document.getElementById("searchText").value.trim();
  const posValue = document.getElementById("searchPos").value;
  const startsWith = document.getElementById("startsWithCheck").checked;
  const endsWith = document.getElementById("endsWithCheck").checked;

  const results = characterNames.filter(item => {
    const name = item.name;

    if(lengthValue && name.length !== Number(lengthValue)) return false;

    if(text){
      if(startsWith){
        if(!name.startsWith(text)) return false;
      }else if(endsWith){
        if(!name.endsWith(text)) return false;
      }else if(posValue){
        const pos = Number(posValue) - 1;
        if(name.indexOf(text) !== pos) return false;
      }else{
        if(!name.includes(text)) return false;
      }
    }

    return true;
  });

  displaySearchResults(results);
}

function displaySearchResults(results){
  document.getElementById("searchCount").textContent = results.length + "件";

  const area = document.getElementById("searchResults");
  area.innerHTML = "";

  results.forEach(item => {
    const div = document.createElement("div");
    div.className = "resultItem";
    div.textContent = item.name;

    div.addEventListener("click", () => {
      selectedWord = item.name;
      document.getElementById("selectedWordText").textContent = selectedWord;
    });

    area.appendChild(div);
  });
}

function clearSelectedWord(){
  selectedWord = "";
  document.getElementById("selectedWordText").textContent = "なし";
}

function saveBoardImage(){
  const board = document.getElementById("board");
  const cellSize = getCellSize();

  html2canvas(board, {
    backgroundColor: "#ffffff",
    scale: 2,
    width: colCount * cellSize + 1,
    height: rowCount * cellSize + 1
  }).then(canvas => {
    const link = document.createElement("a");
    const name = document.getElementById("boardName").value.trim() || "crossword";

    link.download = name + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

window.addEventListener("load", async () => {
  createBoard();
  updateBoardList();
  await loadCharacterNames();
});
</script>

</body>
</html>
