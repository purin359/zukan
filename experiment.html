<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ文字検索</title>
<style>
body{
  font-family:
  sans-serif;
  padding:10px;
}
  
.searchWrap{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}
  
.searchBox{
  flex:1;padding:8px;
  font-size:16px;
}
  
button,select{
  font-size:15px;
  padding:8px;
  margin:3px;
}
  
#menu div{
  padding:5px 10px;
  cursor:pointer;
}
  
#menu div:hover{
  background:#eee;
}
  
.gradeHeader{
  background:#eee;padding:8px;
  cursor:pointer;
  margin-top:10px;
}
  
.grid{
  display:grid;
  grid-template-columns:repeat(20,1fr);
  gap:4px;
  margin-bottom:10px;
}
  
.char{
  border:1px solid #ccc;
  padding:10px;font-size:18px;
  display:flex;
  justify-content:center;
  align-items:center;
}
  
.char.ally{
  background:#dde8ff;
  color:blue;
  font-weight:bold;
}
  
.char.enemy{
  background:#ffdddd;
  color:red;
  font-weight:bold;
}
  
.char.both{
  background:linear-gradient(
    135deg,
    #dde8ff 50%,
    #ffdddd 50%
  );
  color:#6a1b9a;
  font-weight:bold;
}
  
.hit{
  color:blue;
  font-weight:bold;
}
  
.result{
  border-bottom:1px solid #ccc;
  padding:8px 0;
}
  
.result.ally{
  background:#dde8ff;
}
  
.result.enemy{
  background:#ffdddd;
}
  
.result.both{
  background:#e6ccff;
  color:purple;
}
  
#resultScreenInner{
  transform:scale(1.15);
  transform-origin:top left;
  width:86%;
}
  
#result{
  max-height:60vh;
  overflow-y:auto;
  border:1px solid #ccc;
  padding:5px;
}

  #nameMakerResult button{
  background:#eee;
  color:#222;
  border:1px solid #ccc;
  border-radius:6px;
  padding:3px 6px;
}

  .char.stage{
  background:#fff4cc;
  color:#d4a000;
  font-weight:bold;
}

  .char.allyStage{
  background:linear-gradient(135deg,#dde8ff 50%,#fff4cc 50%);
  color:#1a4cff;
  font-weight:bold;
}

.char.enemyStage{
  background:linear-gradient(135deg,#ffdddd 50%,#fff4cc 50%);
  color:#c40000;
  font-weight:bold;
}

.char.allType{
  background:linear-gradient(135deg,#dde8ff 0 33%,#ffdddd 33% 66%,#fff4cc 66%);
  color:#6a1b9a;
  font-weight:bold;
}

  .char.other{
  background:#ddf5dd;
  color:green;
  font-weight:bold;
}

  #result table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

#result th,
#result td{
  border:1px solid #999;
  padding:6px;
  text-align:center;
  vertical-align:middle;
}

#result th{
  background:#f5f5f5;
  position:sticky;
  top:0;
  z-index:1;
}

#result .kanjiCell{
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
}

  .unusedKanji{
  background:#fff3a0;
}

  .usedCell{
  background:#e8f4ff;
}
</style>
</head>

<div id="searchScreen">
<h2 id="pageTitle">味方文字検索　Ver.15.4.0対応</h2>

    <option value="char">キャラの漢字</option>
    <option value="stage">ステージの漢字</option>
    <option value="both">全て</option>

  <select id="searchTarget">
    <option value="both">キャラ名・説明文</option>

<div class="gradeHeader" id="headerGAll" data-base="常用漢字" onclick="toggle('gAll',this)">▼ 常用漢字</div>

  <div id="g7"><div id="grid7" class="grid"></div></div>
</div>

<div class="gradeHeader" id="headerExtra" data-base="常用漢字外" onclick="toggle('extraGrid',this)">
▼ 常用漢字外 0種類
</div>
<div id="extraGrid" class="grid"></div>
</div>

<div id="checkerScreen" style="display:none;">

  <h2 id="checkerTitle">新規漢字チェッカー</h2>
  <textarea id="checkerInput" style="width:100%;height:120px;"></textarea><br><br>
  <button onclick="runChecker()">判定</button>
  <button onclick="clearChecker()">全消し</button>
  <div id="checkerResult" style="margin-top:10px;"></div>

const allKanji = () => chars1.concat(chars2,chars3,chars4,chars5,chars6,chars7);

async function loadAllData(){
  const allyFiles = ["basic.json","ex.json","rare.json","superrare.json","ultrarare.json","legendrare.json"];

  const allyLoaded = await Promise.all(
    allyFiles.map(f => fetch(f).then(r=>r.json()).catch(()=>[]))
  );

  allyData = allyLoaded.flat();
  enemyData = await fetch("enemy.json").then(r=>r.json()).catch(()=>[]);
  stageData = await fetch("stages.json").then(r=>r.json()).catch(()=>[]);
  otherData = await fetch("kanji_other.json").then(r=>r.json()).catch(()=>[]);

  document.getElementById("modeSelect").value = mode;
  applyMode();

  if(hash === "namemaker"){
    showNameMaker();
  }
}

function applyMode(){
  mode = document.getElementById("modeSelect").value;

  flatAlly = flattenAlly(allyData);
  flatEnemy = flattenEnemy(enemyData);
  flatStage = flattenStages(stageData).filter(f =>
  f.typeName !== "不明" &&
  f.typeName !== "海外限定"
);
  flatOther = flattenOther(otherData);

  data =
    mode === "ally" ? flatAlly :
    mode === "enemy" ? flatEnemy :
    flatAlly.concat(flatEnemy);

  changeKanjiTarget();
  usageCountMap = null;
}

function changeMode(){
  document.getElementById("searchInput").value = "";
  applyMode();
}

function flattenAlly(list){
  return list.flatMap(ch =>
    (ch.forms || []).map(f => ({
      name:f.name || "",
      description:f.description || "",
      type:"ally"
    }))
  ).filter(f => f.name || f.description);
}

function flattenEnemy(list){
  return list.map(f => ({
    name:f.name || "",
    description:f.description || "",
    type:"enemy"
  })).filter(f => f.name || f.description);
}

function normalize(str){
  return (str || "").toLowerCase().normalize("NFKC").replace(/\s+/g,"").replace(/　/g,"");
}

function highlight(text,keyword){
  if(!keyword) return text || "";
  return String(text || "").replaceAll(keyword, `<span class="hit">${keyword}</span>`);
}

function isUsedIn(list,c){
  return list.some(f => f.name.includes(c) || f.description.includes(c));
}

function getCharClass(c){
  const ally = flatAlly.some(f =>
    f.name.includes(c) || f.description.includes(c)
  );

  const enemy = flatEnemy.some(f =>
    f.name.includes(c) || f.description.includes(c)
  );

  const stage = flatStage.some(f =>
    f.name.includes(c) || f.description.includes(c)
  );

  const other = flatOther.some(f =>
    f.name.includes(c)
  );

  if(kanjiTarget === "char"){
    if(mode === "ally") return ally ? "ally" : "";
    if(mode === "enemy") return enemy ? "enemy" : "";

    if(ally && enemy) return "both";
    if(ally) return "ally";
    if(enemy) return "enemy";
    return "";
  }

  if(kanjiTarget === "stage"){
    return stage ? "stage" : "";
  }

  // 全て
  if(other) return "other";

  if(ally && enemy && stage) return "allType";
  if(ally && enemy) return "both";
  if(ally && stage) return "allyStage";
  if(enemy && stage) return "enemyStage";
  if(ally) return "ally";
  if(enemy) return "enemy";
  if(stage) return "stage";

  return "";
}

  function isSearchHit(f, keyword){
  const searchType = kanjiTarget;
  const target = document.getElementById("searchTarget").value;

  if(searchType === "stage"){
    if(f.type === "chapter"){
      return hasExactText(f.name, keyword);
    }

    if(f.type === "stage"){
      return hasExactText(f.name, keyword);
    }

    return false;
  }

  const nameHit = hasExactText(f.name, keyword);
  const descHit = hasExactText(f.description, keyword);

  if(target === "name") return nameHit;
  if(target === "desc") return descHit;

  return nameHit || descHit;
}

function search(keyword, from = "home"){
  returnMode = from;
  lastMode = "search";
  openResult();

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const key = normalize(keyword);
  let total = 0;

  getSearchData().forEach(f=>{
    if(isSearchHit(f, keyword)){
      total++;

      const div = document.createElement("div");
      div.className = `result ${mode === "integrated" ? f.type : ""}`;

      if(f.type === "stage"){
        div.innerHTML = `
          <strong>
            ${highlight(f.chapterName, keyword)}
            -
            ${highlight(f.name, keyword)}
          </strong>
        `;
      }
      else if(f.type === "chapter"){
        div.innerHTML = `
          <strong>${highlight(f.name, keyword)}</strong>
        `;
      }
      else if(f.type === "other"){
        div.innerHTML = `
          <strong>${highlight(f.name, keyword)}</strong><br>
          場所：${f.place}　　　用法：${f.usage}
        `;
      }
      else{
        div.innerHTML = `
          <strong>${highlight(f.name, keyword)}</strong><br>
          ${highlight(f.description, keyword).replace(/\n/g,"<br>")}
        `;
      }
      
      resultDiv.appendChild(div);
    }
  });

  const searchType = kanjiTarget;

  let targetText;

  if(searchType === "stage"){
    targetText = "";
  }else{
    targetText =
      document.getElementById("searchTarget").value === "name"
        ? "キャラ名のみ"
        : document.getElementById("searchTarget").value === "desc"
        ? "説明文のみ"
        : "キャラ名・説明文";
  }

  document.getElementById("selectedText").innerText =
    total
      ? searchType === "stage"
        ? `"${keyword}" の検索結果 ${total}件見つかりました`
        : `"${keyword}" の検索結果（${targetText}） ${total}件見つかりました`
      : searchType === "stage"
        ? `"${keyword}" は見つかりませんでした`
        : `"${keyword}" （${targetText}） は見つかりませんでした`;
  }

  function hasExactText(text, keyword){
  text = String(text || "");
  keyword = String(keyword || "");

  if(!keyword) return false;

  const textChars = splitChars(text);
  const keyChars = splitChars(keyword);

  for(let i = 0; i <= textChars.length - keyChars.length; i++){
    let ok = true;

    for(let j = 0; j < keyChars.length; j++){
      if(textChars[i + j] !== keyChars[j]){
        ok = false;
        break;
      }
    }

    if(ok) return true;
  }

  return false;
}

function runChecker(){

  const unique = [...new Set(
    splitChars(text).filter(c => /[\u4E00-\u9FFF]/.test(c))
  )];

  if(!unique.length){
    resultDiv.innerText = "漢字が見つかりませんでした";
    return;
  }

  const existing = [];
  const newChars = [];

  unique.forEach(c=>{
    let count = 0;
    const targetList =
      kanjiTarget === "stage"
        ? flatStage
        : data;

    targetList.forEach(f=>{
      if(f.name.includes(c) || (f.description || "").includes(c)) count++;
    });

    if(count) existing.push(`${c}(${count}回)`);
    else newChars.push(c);
  });

  let html = "";
  if(existing.length) html += `既存：${existing.join("、")}<br>`;
  if(newChars.length) html += `<span style="color:red;">新規：${newChars.join("、")}</span>`;
  resultDiv.innerHTML = html;
}

function runNameMaker(){
  const input = document.getElementById("nameMakerInput").value.trim();
  const resultDiv = document.getElementById("nameMakerResult");
  resultDiv.innerHTML = "";

  if(!input){
    resultDiv.innerText = "文字を入力してください";
    return;
  }

  const chars = splitChars(input);

  // 全候補を作る
  const candidates = [];

  for(let start = 0; start < chars.length; start++){
    for(let end = start + 1; end <= chars.length; end++){
      const text = chars.slice(start, end).join("");
      const names = findNamesByText(text);

      if(names.length > 0){
        candidates.push({
          start,
          end,
          text,
          names,
          len: end - start
        });
      }
    }
  }

  const patterns = [];
  const MAX_PATTERNS = 80;

  function dfs(pos, parts, score){
    if(patterns.length >= MAX_PATTERNS) return;

    if(pos >= chars.length){
      patterns.push({
        parts:[...parts],
        score
      });
      return;
    }

    // 現在位置から始まる候補
    const nextCandidates = candidates
      .filter(c => c.start === pos)
      .sort((a,b) => b.len - a.len);

    // 候補を使う
    nextCandidates.forEach(c=>{
      parts.push({
        text:c.text,
        names:c.names,
        exists:true,
        start:c.start,
        end:c.end
      });

      dfs(
        c.end,
        parts,
        score + c.len * c.len * 10
      );

      parts.pop();
    });

    // 見つからない1文字として進める
    parts.push({
      text:chars[pos],
      names:[],
      exists:false,
      start:pos,
      end:pos + 1
    });

    dfs(pos + 1, parts, score - 5);

    parts.pop();
  }

  dfs(0, [], 0);

  if(patterns.length === 0){
    resultDiv.innerText = "候補が見つかりませんでした";
    return;
  }

  // スコア順、同点なら存在しない文字が少ない順
  patterns.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;

    const aMissing = a.parts.filter(p=>!p.exists).length;
    const bMissing = b.parts.filter(p=>!p.exists).length;

    return aMissing - bMissing;
  });

  // 重複パターン除去
  const unique = [];
  const seen = new Set();

  patterns.forEach(p=>{
    const key = p.parts.map(x=>x.text).join("|");
    if(seen.has(key)) return;

    seen.add(key);
    unique.push(p);
  });

  const topPatterns = unique.slice(0,3);

  const inputPreview = document.createElement("div");
  inputPreview.style.marginBottom = "12px";
  inputPreview.style.fontSize = "20px";
  inputPreview.innerHTML = `入力：${input}`;
  resultDiv.appendChild(inputPreview);

  topPatterns.forEach((pattern, index)=>{
    const box = document.createElement("div");
    box.style.border = "1px solid #ccc";
    box.style.padding = "8px";
    box.style.marginBottom = "10px";

    const title = document.createElement("div");
    title.innerHTML = `<strong>パターン${index + 1}</strong>`;
    title.style.marginBottom = "6px";
    box.appendChild(title);

    pattern.parts.forEach(part=>{
      const div = document.createElement("div");
      div.style.borderBottom = "1px solid #eee";
      div.style.padding = "6px 0";

      if(!part.exists){
        div.innerHTML =
          `<strong style="color:red;">${part.text}</strong>　存在しません`;
      }else{
        const show = part.names.slice(0,3).map(name =>
          name.replaceAll(
            part.text,
            `<strong>${part.text}</strong>`
          )
        ).join("、");

        const rest = part.names.length - 3;
        const listId =
          `nameList_${index}_${part.start}_${part.end}_${part.text}`;

        div.innerHTML = `
          <strong>${part.text}</strong>　${show}
          ${
            rest > 0
              ? `　<button onclick="toggleNameList('${listId}')">他${rest}件</button>`
              : ""
          }
          <div id="${listId}" style="display:none;margin-top:6px;padding-left:16px;">
            ${part.names.map(n =>
              `<div>${
                n.replaceAll(
                  part.text,
                  `<strong>${part.text}</strong>`
                )
              }</div>`
            ).join("")}
          </div>
        `;
      }

      box.appendChild(div);
    });

    resultDiv.appendChild(box);
  });
}

function flattenStages(list){
  return list.flatMap(ch => {
    const typeName = ch.type || "";

    const chapter = {
      name: ch.chapterName || "",
      chapterName: ch.chapterName || "",
      description: "",
      type: "chapter",
      typeName: typeName,
      mapId: ch.mapId ?? ""
    };

    const stages = (ch.stages || []).map(s => ({
      name: s.stageName || "",
      chapterName: ch.chapterName || "",
      description: "",
      type: "stage",
      typeName: typeName,
      mapId: ch.mapId ?? ""
    }));

    return [chapter, ...stages];
  }).filter(x => x.name);
}

    mode === "enemy" ? flatEnemy :
    flatAlly.concat(flatEnemy);

  if(kanjiTarget === "char") return charList;
  if(kanjiTarget === "stage") return flatStage;

  return charList;
}

  function draw(){
    const mapKey =
      document.getElementById("stageMapFilter").value.trim();

    listDiv.innerHTML = "";

    let total = 0;

    const chapters = {};

    flatStage.forEach(f=>{
      const mapId = String(f.mapId ?? "");
      const chapterName = f.chapterName || "";

      if(mapKey && !mapId.includes(mapKey)){
        return;
      }

      const key = `${mapId}_${chapterName}`;

      if(!chapters[key]){
        chapters[key] = {
          mapId,
          chapterName,
          stages: []
        };
      }

      if(f.type === "stage"){
        chapters[key].stages.push(f.name);
      }
    });

    Object.values(chapters).forEach(ch=>{
      const chapterDiv = document.createElement("div");
      chapterDiv.className = "result";
      chapterDiv.innerHTML =
        `<strong>${ch.mapId}　${ch.chapterName}</strong>`;
      listDiv.appendChild(chapterDiv);

      ch.stages.forEach(stageName=>{
        total++;

        const div = document.createElement("div");
        div.className = "result";
        div.style.paddingLeft = "16px";
        div.innerHTML =
          `${ch.chapterName} - ${stageName}`;

        listDiv.appendChild(div);
      });
    });

    document.getElementById("selectedText").innerText =
      `ステージ一覧：${total}件`;
  }

  document
    .getElementById("stageMapFilter")
    .addEventListener("input", draw);

  draw();
}
  
  function showSingleStageOnly(addHistory = true){
  lastMode = "singleStage";
  openResult(addHistory);

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  let total = 0;

  allKanji().forEach(c=>{
    let count = 0;
    let found = "";

    flatStage.forEach(f=>{
      if(f.name.includes(c)){
        count++;

        found =
          f.type === "chapter"
            ? f.name
            : `${f.chapterName} - ${f.name}`;
      }
    });

    if(count === 1){
      total++;

      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `<strong>${c}</strong> ： ${found}`;

      div.onclick = ()=>{
        singleScrollY = document.getElementById("result").scrollTop;
        document.getElementById("searchInput").value = c;
        search(c, "single");
      };

      resultDiv.appendChild(div);
    }
  });

  document.getElementById("selectedText").innerText =
    `1件しかヒットしない文字一覧(ステージ)：${total}件`;
}

  function showStageRanking(addHistory = true){
  lastMode = "stageRanking";
  openResult(addHistory);

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const list = allKanji().map(c=>{
    let count = 0;

    flatStage.forEach(f=>{
      if(f.name.includes(c)) count++;
    });

    return {char:c,count};
  })
  .filter(x=>x.count>0)
  .sort((a,b)=>b.count-a.count);

  let rank = 0;
  let prev = -1;

  list.forEach((item,i)=>{
    if(item.count !== prev){
      rank = i + 1;
      prev = item.count;
    }

    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `${rank}位　<strong>${item.char}</strong>（${item.count}件）`;

    div.onclick = ()=>{
      rankingScrollY = document.getElementById("result").scrollTop;
      document.getElementById("searchInput").value = item.char;
      search(item.char, "ranking");
    };

    resultDiv.appendChild(div);
  });

  document.getElementById("selectedText").innerText =
    "使用率ランキング(ステージ)";
}

  function showStageChecker(){
  showChecker();
  document.getElementById("checkerTitle").innerText =
    "ステージ 新規文字チェッカー";
}

  // その他
  function flattenOther(list){
  return list.map(x => ({
    name: x.漢字 || "",
    place: x.場所 || "",
    usage: x.用法 || "",
    description: "",
    type: "other"
  })).filter(x => x.name);
}

// 使用回数表
let usageSortKey = "none";
let usageSortDir = "desc";
let usageGradeFilter = "all";

function getGradeKanji(type){
  if(type === "g1") return chars1;
  if(type === "g2") return chars2;
  if(type === "g3") return chars3;
  if(type === "g4") return chars4;
  if(type === "g5") return chars5;
  if(type === "g6") return chars6;

  if(type === "elem"){
    return chars1.concat(chars2,chars3,chars4,chars5,chars6);
  }

  if(type === "junior"){
    return chars7;
  }

  if(type === "extra"){
    return getExtraKanjiList();
  }

  return allKanji().concat(getExtraKanjiList());
}

function countInList(list, c, withDesc = true){
  return list.filter(x =>
    (x.name || "").includes(c) ||
    (withDesc && (x.description || "").includes(c))
  ).length;
}

function showUsageTable(){
  openResult();

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const control = document.createElement("div");
  control.style.marginBottom = "8px";

  control.innerHTML = `
    <select id="usageGradeFilter">
      <option value="all">全て</option>
      <option value="elem">小学生</option>
      <option value="g1">1年生</option>
      <option value="g2">2年生</option>
      <option value="g3">3年生</option>
      <option value="g4">4年生</option>
      <option value="g5">5年生</option>
      <option value="g6">6年生</option>
      <option value="junior">中学生</option>
      <option value="extra">常用漢字外</option>
    </select>

    <select id="usageSortKey">
      <option value="none">ソートなし</option>
      <option value="total">合計順</option>
      <option value="ally">味方順</option>
      <option value="enemy">敵順</option>
      <option value="stage">ステージ順</option>
    </select>

    <select id="usageSortDir">
      <option value="desc">多い順</option>
      <option value="asc">少ない順</option>
    </select>
  `;

  resultDiv.appendChild(control);

  document.getElementById("usageGradeFilter").value = usageGradeFilter;
  document.getElementById("usageSortKey").value = usageSortKey;
  document.getElementById("usageSortDir").value = usageSortDir;

  const tableWrap = document.createElement("div");
  resultDiv.appendChild(tableWrap);

  function draw(){
    usageGradeFilter = document.getElementById("usageGradeFilter").value;
    usageSortKey = document.getElementById("usageSortKey").value;
    usageSortDir = document.getElementById("usageSortDir").value;

    document.getElementById("usageSortDir").style.display =
      usageSortKey === "none" ? "none" : "";

    if(!usageCountMap){
      buildUsageCountMap();
    }

    const rows = getGradeKanji(usageGradeFilter).map(c=>{
      const count = usageCountMap[c] || {
        ally: 0,
        enemy: 0,
        stage: 0,
        other: 0
      };

      const ally = count.ally;
      const enemy = count.enemy;
      const stage = count.stage;
      const other = count.other;
      const total = ally + enemy + stage + other;

      return {c, ally, enemy, stage, other, total};
    });

    if(usageSortKey !== "none"){
      rows.sort((a,b)=>{
        const diff =
          usageSortDir === "asc"
            ? a[usageSortKey] - b[usageSortKey]
            : b[usageSortKey] - a[usageSortKey];

        if(diff !== 0) return diff;

        return a.c.localeCompare(b.c, "ja");
      });
    }

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th>漢字</th>
        <th>味方</th>
        <th>敵</th>
        <th>ステージ</th>
        <th>その他</th>
        <th>合計</th>
      </tr>
    `;

    rows.forEach(r=>{
      const isUnused = r.total === 0;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="kanjiCell ${isUnused ? "unusedKanji" : ""}">
          ${r.c}
        </td>

        <td
          class="${r.ally > 0 ? "usedCell" : ""}"
          onclick="showUsageDetail('${r.c}','ally')">
          ${r.ally}
        </td>

        <td
          class="${r.enemy > 0 ? "usedCell" : ""}"
          onclick="showUsageDetail('${r.c}','enemy')">
          ${r.enemy}
        </td>

        <td
          class="${r.stage > 0 ? "usedCell" : ""}"
          onclick="showUsageDetail('${r.c}','stage')">
          ${r.stage}
        </td>

        <td
          class="${r.other > 0 ? "usedCell" : ""}"
          onclick="showUsageDetail('${r.c}','other')">
          ${r.other > 0 ? "○" : "-"}
        </td>

        <td
          class="${r.total > 0 ? "usedCell" : ""}"
          onclick="showUsageDetail('${r.c}','total')">
          ${r.total}
        </td>
      `;

      table.appendChild(tr);
    });

    tableWrap.innerHTML = "";
    tableWrap.appendChild(table);

    document.getElementById("selectedText").innerText =
      `使用回数表：${rows.length}字`;
  }

  ["usageGradeFilter","usageSortKey","usageSortDir"].forEach(id=>{
    control.querySelector(`#${id}`).addEventListener("change", draw);
  });

  draw();
}

  function showUsageDetail(c, type){
    usageTableScrollY = document.getElementById("result").scrollTop;
    lastMode = "usageDetail";

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  let list = [];

  if(type === "ally" || type === "total"){
    list = list.concat(
      flatAlly
        .filter(x => x.name.includes(c) || x.description.includes(c))
        .map(x => ({
          type:"味方",
          text:x.name,
          desc:x.description
        }))
    );
  }

  if(type === "enemy" || type === "total"){
    list = list.concat(
      flatEnemy
        .filter(x => x.name.includes(c) || x.description.includes(c))
        .map(x => ({
          type:"敵",
          text:x.name,
          desc:x.description
        }))
    );
  }

  if(type === "stage" || type === "total"){
    list = list.concat(
      flatStage
        .filter(x => x.name.includes(c))
        .map(x => ({
          type:"ステージ",
          text:x.type === "chapter"
            ? x.name
            : `${x.chapterName} - ${x.name}`,
          desc:""
        }))
    );
  }

  if(type === "other" || type === "total"){
    list = list.concat(
      flatOther
        .filter(x => x.name.includes(c))
        .map(x => ({
          type:"その他",
          text:`場所：${x.place}`,
          desc:`用法：${x.usage}`
        }))
    );
  }

  list.forEach(item=>{
    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `
      <strong>[${item.type}] ${highlight(item.text, c)}</strong><br>
      ${highlight(item.desc || "", c).replace(/\n/g,"<br>")}
    `;
    resultDiv.appendChild(div);
  });

  document.getElementById("selectedText").innerText =
    `「${c}」の使用一覧：${list.length}件`;
}

  function buildUsageCountMap(){
  const map = {};

  allKanji().forEach(c=>{
    map[c] = {
      ally: 0,
      enemy: 0,
      stage: 0,
      other: 0
    };
  });

  allKanji().forEach(c=>{
    flatAlly.forEach(x=>{
      if((x.name || "").includes(c) || (x.description || "").includes(c)){
        map[c].ally++;
      }
    });

    flatEnemy.forEach(x=>{
      if((x.name || "").includes(c) || (x.description || "").includes(c)){
        map[c].enemy++;
      }
    });

    flatStage.forEach(x=>{
      if((x.name || "").includes(c)){
        map[c].stage++;
      }
    });

    flatOther.forEach(x=>{
      if((x.name || "").includes(c)){
        map[c].other++;
      }
    });
  });

  usageCountMap = map;
}

  function getExtraKanjiList(){
  const normal = new Set(allKanji());

  const targetList =
    flatAlly
      .concat(flatEnemy)
      .concat(flatStage)
      .concat(flatOther);

  return [...new Set(
    targetList.flatMap(f =>
      splitChars(f.name)
    ).filter(c =>
      /[\u4E00-\u9FFF]/.test(c) &&
      !normal.has(c)
    )
  )].sort((a,b)=>a.localeCompare(b,"ja"));
}
